<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị dữ liệu - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: #1e293b; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { 
            padding: 16px 24px; cursor: pointer; border-left: 4px solid transparent; color: #94a3b8; 
            font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 12px;
            text-decoration: none; transition: all 0.2s;
        }
        .nav-item:hover { background-color: #0f172a; color: white; }
        .nav-item.active { background-color: #0f172a; color: white; border-left-color: #ef4444; font-weight: 800; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex: 1; width: 100%; border: none; background-color: #f1f5f9; }
    </style>
</head>
<body>
    <aside class="sidebar shadow-2xl">
        <div class="p-8 border-b border-slate-700 text-center">
            <h2 class="text-xl font-black text-red-400 uppercase tracking-tighter italic">ADMIN PANEL</h2>
            <div class="text-[9px] font-bold text-slate-500 uppercase mt-2 tracking-widest italic">Cập nhật số liệu</div>
        </div>

        <nav class="flex-1 mt-6">
            <a href="nhap-lieu/nhap-lieu-don-thu.html" target="admin-frame" class="nav-item active" onclick="setActive(this)">📂 Đơn thư & Tiếp dân</a>
            <a href="nhap-lieu/nhap-lieu-1022.html" target="admin-frame" class="nav-item" onclick="setActive(this)">📞 Phản ánh 1022</a>
            <a href="nhap-lieu/nhap-lieu-ho-so-hanh-chinh.html" target="admin-frame" class="nav-item" onclick="setActive(this)">📋 Hồ sơ hành chính</a>
            <a href="nhap-lieu/nhap-dau-tu-cong.html" target="admin-frame" class="nav-item" onclick="setActive(this)">🏗️ Đầu tư công</a>
            <a href="nhap-lieu/nhap-lieu-van-ban.html" target="admin-frame" class="nav-item" onclick="setActive(this)">⚖️ Văn bản chỉ đạo</a>
            <a href="nhap-lieu/nhap-lieu-chi-tieu.html" target="admin-frame" class="nav-item" onclick="setActive(this)">📊 Chỉ tiêu KT-XH</a>
        </nav>
        
        <div class="p-6">
            <a href="tong-quan.html" class="block text-center py-3 bg-slate-700 hover:bg-slate-600 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                📊 Xem Dashboard
            </a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="bg-white border-b p-4 px-10 flex justify-between items-center shadow-sm relative z-10">
            <h2 id="admin-title" class="text-sm font-black text-slate-800 uppercase italic tracking-wider text-red-600">Đơn thư & Tiếp dân</h2>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                <span class="text-red-600 text-[10px] font-black uppercase tracking-widest">Chế độ hiệu chỉnh dữ liệu</span>
            </div>
        </header>
        <iframe name="admin-frame" src="nhap-lieu/nhap-lieu-don-thu.html"></iframe>
    </div>

    <script>
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            
            // Cập nhật tiêu đề header linh hoạt hơn (loại bỏ biểu tượng cảm xúc và khoảng trắng đầu tiên)
            const titleWithIcon = el.innerText;
            // Sử dụng Regex để loại bỏ icon/emoji ở đầu chuỗi
            const cleanTitle = titleWithIcon.replace(/^[\s\uD800-\uDBFF\uDC00-\uDFFF\u2000-\u32FF\u2700-\u27BF]+/, '').trim();
            document.getElementById('admin-title').innerText = cleanTitle;
        }
    </script>
</body>
</html>
