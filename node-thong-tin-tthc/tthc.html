<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Thủ tục hành chính - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================= QUẢN LÝ MÀU NỀN & THEME TỔNG THỂ ================= */
        body { font-family: 'Inter', 'Be Vietnam Pro', sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; transition: background 0.4s ease, color 0.4s ease; }
        
        /* THEME SÁNG (MẶC ĐỊNH) */
        body.light-theme { background-color: #f8fafc; color: #1e3a8a; }
        
        /* THEME TỐI (UNIFIED DARK MODE - KHÔNG DÙNG MÀU ĐEN) */
        body.dark-theme { background-color: #082f49; color: #e0f2fe; }

        /* ================= HEADER GRADIENT (SÁNG/TỐI/XANH/ĐỎ) ================= */
        body.light-theme.theme-xanh-ios .main-header { background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; box-shadow: 0 4px 15px rgba(11, 74, 143, 0.15); border-bottom: 2px solid #032b5c; }
        
        /* Chuyển sang dải gradient Đỏ Cờ chuẩn (#da251d) rực rỡ */
        body.light-theme.theme-do-hanhchinh .main-header { background: linear-gradient(-45deg, #da251d, #a81c15, #ff3b33, #7a120e); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; box-shadow: 0 4px 15px rgba(218, 37, 29, 0.3); border-bottom: 2px solid #a81c15; }
        
        /* Theme Tối chuyên dụng */
        body.dark-theme .main-header { background: linear-gradient(-45deg, #020617, #0f172a, #082f49, #020617); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; box-shadow: 0 4px 15px rgba(8, 47, 73, 0.5); border-bottom: 2px solid #082f49; }

        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* ẨN NÚT CHỌN XANH/ĐỎ KHI Ở THEME TỐI */
        body.dark-theme .theme-selector-vertical { display: none !important; }

        /* LOGO ANIMATION */
        .logo-main { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2)); } 50% { transform: translateY(-3px); filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3)); } }

        /* ================= KHỐI NỀN ĐỘNG BAO BỌC CHÍNH ================= */
        .menu-panel-wrapper { 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 32px; 
            width: 100%; padding: 24px 32px 32px 32px; transition: all 0.5s ease; 
        }
        
        body.light-theme.theme-xanh-ios .menu-panel-wrapper { background-color: rgba(128, 255, 232, 0.45); box-shadow: 0 20px 50px -10px rgba(12, 74, 110, 0.15); }
        
        /* Ép nền đỏ cờ tươi rực, chống xỉn màu */
        body.light-theme.theme-do-hanhchinh .menu-panel-wrapper { background-color: rgba(218, 37, 29, 0.95); box-shadow: 0 20px 50px -10px rgba(168, 28, 21, 0.4); border-color: rgba(255, 255, 255, 0.8); }
        
        body.dark-theme .menu-panel-wrapper { background-color: rgba(8, 47, 73, 0.6); box-shadow: 0 20px 50px -10px rgba(8, 47, 73, 0.4); border-color: rgba(56, 189, 248, 0.2); }

        /* ĐỒNG BỘ MÀU BANNER TIÊU ĐỀ */
        .title-banner { transition: all 0.5s ease; }
        body.light-theme.theme-xanh-ios .title-banner { background-color: #14b8a6; border-bottom-color: #0d9488; color: white; }
        
        /* Banner Tiêu đề: Đỏ Cờ */
        body.light-theme.theme-do-hanhchinh .title-banner { background-color: #da251d; border-bottom-color: #a81c15; color: white; }
        
        body.dark-theme .title-banner { background-color: rgba(15, 23, 42, 0.7); border-bottom-color: rgba(56, 189, 248, 0.5); color: #38bdf8; backdrop-filter: blur(10px); }

        /* KHUNG HIỂN THỊ NỘI DUNG CHÍNH */
        .content-viewer-container { width: 100%; height: 750px; border-radius: 20px; overflow-y: auto; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08); border: 1px solid; transition: all 0.3s; position: relative; }
        body.light-theme .content-viewer-container { background: #ffffff; border-color: rgba(14, 165, 233, 0.2); }
        body.dark-theme .content-viewer-container { background: rgba(15, 23, 42, 0.6); border-color: rgba(56, 189, 248, 0.3); }

        /* TAB BUTTONS */
        .tab-btn { border: 1px solid; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; padding: 12px 24px; border-radius: 12px; transition: all 0.2s; white-space: nowrap; }
        body.light-theme .tab-btn { background: #ffffff; border-color: #e2e8f0; }
        body.light-theme.theme-xanh-ios .tab-btn { color: #1e3a8a; }
        body.light-theme.theme-xanh-ios .tab-btn.active { background: #1e40af; color: white; border-color: #1e40af; }
        
        /* Tab Button: Đỏ Cờ */
        body.light-theme.theme-do-hanhchinh .tab-btn { color: #da251d; border-color: #fca5a5; }
        body.light-theme.theme-do-hanhchinh .tab-btn.active { background: #da251d; color: white; border-color: #da251d; } 
        
        body.dark-theme .tab-btn { background: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.3); color: #38bdf8; }
        body.dark-theme .tab-btn.active { background: #0284c7; color: white; border-color: #38bdf8; }

        /* NÚT QUAY LẠI */
        .btn-back { display: inline-flex; align-items: center; gap: 8px; border: 1px solid; padding: 10px 20px; border-radius: 12px; font-weight: 800; font-size: 12px; text-transform: uppercase; transition: all 0.3s ease; background: #ffffff; border-color: #e2e8f0; }
        body.light-theme.theme-xanh-ios .btn-back { color: #1e3a8a; }
        body.light-theme.theme-xanh-ios .btn-back:hover { transform: translateY(-2px); border-color: #0ea5e9; color: #0ea5e9; }
        
        /* Nút quay lại: Đỏ Cờ */
        body.light-theme.theme-do-hanhchinh .btn-back { color: #da251d; border-color: #fca5a5; }
        body.light-theme.theme-do-hanhchinh .btn-back:hover { transform: translateY(-2px); border-color: #da251d; color: #da251d; }
        
        body.dark-theme .btn-back { background: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.3); color: #38bdf8; }
        body.dark-theme .btn-back:hover { transform: translateY(-2px); border-color: #7dd3fc; background: rgba(8, 47, 73, 0.9); color: white;}

        /* ACCORDION (HƯỚNG DẪN) TỐI ƯU CẢ 3 THEMES BẰNG CSS */
        .acc-btn { transition: all 0.3s; }
        body.light-theme.theme-xanh-ios .acc-btn { border-color: #e2e8f0; background: #ffffff; color: #1e3a8a; }
        body.light-theme.theme-xanh-ios .acc-btn:hover { background: #f0f9ff; color: #0ea5e9; }
        body.light-theme.theme-xanh-ios .acc-content { background: #f8fafc; border-color: #f1f5f9; }
        
        /* Accordion: Đỏ Cờ */
        body.light-theme.theme-do-hanhchinh .acc-btn { border-color: #fecaca; background: #ffffff; color: #da251d; }
        body.light-theme.theme-do-hanhchinh .acc-btn:hover { background: #fef2f2; color: #a81c15; }
        body.light-theme.theme-do-hanhchinh .acc-content { background: #fef2f2; border-color: #ffe4e6; }
        
        body.dark-theme .acc-btn { border-color: rgba(56, 189, 248, 0.3); background: rgba(8, 47, 73, 0.6); color: #38bdf8; }
        body.dark-theme .acc-btn:hover { background: rgba(8, 47, 73, 0.9); }
        body.dark-theme .acc-content { background: rgba(15, 23, 42, 0.5); border-color: rgba(56, 189, 248, 0.2); }

        /* LOOKUP LINKS TỐI ƯU THEMES */
        .lookup-card { transition: all 0.3s; }
        body.light-theme .lookup-card { background: #ffffff; border-color: #e2e8f0; color: #1e3a8a; }
        body.light-theme .lookup-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        body.dark-theme .lookup-card { background: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.3); color: #e0f2fe; }
        body.dark-theme .lookup-card:hover { transform: translateY(-4px); border-color: #38bdf8; background: rgba(8, 47, 73, 0.9); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4); }

        /* SCROLLBAR */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.4); border-radius: 10px; }
        
        /* FOOTER */
        body.dark-theme footer { background-color: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.2); color: #38bdf8; backdrop-filter: blur(10px); }

        @media (max-width: 1024px) {
            .header-layout { flex-direction: column !important; }
            .theme-selector-vertical { position: relative !important; top: 0 !important; right: 0 !important; margin-top: 16px; flex-direction: row !important; space-x: 2; width: auto !important; }
            .theme-selector-vertical button { margin-left: 4px; margin-right: 4px; }
            .menu-panel-wrapper { padding: 20px 20px 24px; }
        }
    </style>
</head>
<body class="theme-xanh-ios light-theme custom-scrollbar" id="dynamic-body">

    <header class="main-header w-full py-6 px-6 md:px-12 select-none relative transition-all duration-300">
        <div class="max-w-[1550px] mx-auto flex flex-col items-center justify-center relative header-layout">
            
            <div class="flex flex-row items-center space-x-6 w-auto">
                <div class="flex-shrink-0">
                    <img src="logo.png" alt="Logo" class="logo-main w-20 h-auto" onerror="this.src='logo.png'">
                </div>
                <div class="flex flex-col items-start justify-center space-y-2 text-left">
                    <p class="text-white font-black tracking-[0.12em] text-xl md:text-2xl lg:text-3xl uppercase leading-none m-0 p-0 drop-shadow-[0_2px_4px_rgba(12,74,110,0.5)] font-['Montserrat']">
                        IOC BINH HUNG
                    </p>
                    <h1 class="title-main text-sm md:text-base lg:text-lg font-bold uppercase tracking-[0.08em] text-white/90 leading-tight m-0 p-0 drop-shadow-[0_2px_4px_rgba(12,74,110,0.4)]">
                        Cổng thông tin và điều hành xã Bình Hưng, Thành phố Hồ Chí Minh
                    </h1>
                </div>
            </div>

            <div class="theme-selector-vertical lg:absolute lg:top-0 lg:right-0 bg-white/10 backdrop-blur-md border border-white/20 p-1.5 rounded-xl flex flex-col space-y-1.5 w-[75px] z-20 shadow-inner">
                <button onclick="switchSystemTheme('xanh')" id="btn-theme-xanh" class="w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-blue-600 text-white shadow-md">🔵 Xanh</button>
                <button onclick="switchSystemTheme('do')" id="btn-theme-do" class="w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white">🔴 Đỏ</button>
            </div>
            
        </div>
    </header>

    <div class="max-w-[1550px] w-full mx-auto px-4 md:px-6 mt-6 mb-4">
        <div class="title-banner py-4 md:py-5 px-8 text-center shadow-lg rounded-2xl border-b-4">
            <h2 class="font-['Montserrat'] text-xl md:text-3xl font-black uppercase tracking-wider leading-tight">
                THÔNG TIN LIÊN QUAN THỦ TỤC HÀNH CHÍNH
            </h2>
        </div>
    </div>

    <div class="max-w-[1550px] w-full mx-auto px-4 md:px-6 my-2 pb-12 flex flex-col flex-grow">

        <article class="menu-panel-wrapper flex flex-col space-y-4">
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-white/40 pb-3">
                <div class="flex flex-wrap items-center gap-3 w-full md:w-auto shrink-0">
                    <a href="../home.html" class="btn-back">
                        ⬅️ Quay lại Trang chủ
                    </a>
                    
                    <div class="bg-blue-900/10 dark:bg-sky-500/10 border border-blue-200 dark:border-sky-500/20 p-1 rounded-xl flex items-center shadow-sm backdrop-blur">
                        <button onclick="setTheme('light')" id="btn-theme-light" class="flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition border border-transparent text-blue-900">☀️ Sáng</button>
                        <button onclick="setTheme('dark')" id="btn-theme-dark" class="flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition border border-transparent text-slate-500 hover:text-blue-900 dark:text-sky-200 dark:hover:text-white">🌙 Tối</button>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-row gap-3 overflow-x-auto pb-2 custom-scrollbar">
                <button onclick="changeContent('intro', '', this)" class="tab-btn shrink-0">🏛️ TT Phục vụ Hành chính công</button>
                <button onclick="changeContent('qr-slider', '', this)" class="tab-btn shrink-0">📱 Mã QR TTHC</button>
                <button onclick="changeContent('accordion-guide', '', this)" class="tab-btn shrink-0">📖 Hướng dẫn TTHC</button>
                <button onclick="changeContent('search-tthc', '', this)" class="tab-btn shrink-0">🔎 CSDL Tra cứu TTHC</button>
                <button onclick="changeContent('lookup-links', '', this)" class="tab-btn shrink-0">🌐 Cổng DVC Trực tuyến</button>
            </div>

            <div id="viewer-viewport" class="content-viewer-container custom-scrollbar"></div>
            
            <p id="helper-text" class="text-center text-xs font-bold italic opacity-80 mt-2">💡 Hướng dẫn: Xem chi tiết phía trên hoặc bấm các tab chức năng để thao tác.</p>
        </article>
        
    </div>

    <footer class="w-full text-center py-6 font-medium text-[11px] uppercase tracking-widest border-t bg-white shadow-sm mt-auto transition-all duration-300">
        &copy; 2026 IOC BINH HƯNG — BẢN QUYỀN THUỘC UBND XÃ BÌNH HƯNG
    </footer>

    <script>
        // ================= DỮ LIỆU ĐƯỢC TẢI TỪ FILE JSON =================
        let dataTTHC = [];
        const tthcHashMap = new Map();

        async function loadTTHCData() {
            try {
                // Tải file JSON từ cùng thư mục
                const response = await fetch('danh_sach_tthc.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                dataTTHC = await response.json();
                
                // Nạp vào Hash Map để tìm kiếm O(1)
                dataTTHC.forEach(item => tthcHashMap.set(item["Mã số"], item));
                
                // Nếu người dùng đang mở tab Tra cứu thì render kết quả ngay lập tức
                const resultsContainer = document.getElementById('searchResults');
                if (resultsContainer) {
                    executeSearch();
                }
            } catch (error) {
                console.error("Lỗi khi tải file danh_sach_tthc.json:", error);
                const resultsContainer = document.getElementById('searchResults');
                if(resultsContainer) {
                    resultsContainer.innerHTML = `<p class="text-center text-red-500 font-bold mt-10">Lỗi: Không thể tải dữ liệu. Vui lòng kiểm tra lại file danh_sach_tthc.json có nằm đúng thư mục không.</p>`;
                }
            }
        }

        // HÀM LOẠI BỎ DẤU TIẾNG VIỆT
        function removeAccents(str) {
            return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        }

        // HÀM XỬ LÝ TÌM KIẾM THEO TỪ KHÓA LIỀN MẠCH (EXACT PHRASE MATCH)
        window.executeSearch = function() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsContainer = document.getElementById('searchResults');
            const isDark = document.body.classList.contains('dark-theme');
            
            const cardClass = isDark ? 'bg-slate-800 border-slate-700 text-sky-100 shadow-md' : 'bg-white border-slate-200 text-slate-700 shadow-sm';
            const codeClass = isDark ? 'bg-sky-900/60 text-sky-300' : 'bg-sky-100/70 text-sky-700';

            // Nếu dữ liệu chưa tải xong hoặc rỗng
            if(dataTTHC.length === 0) {
                resultsContainer.innerHTML = `<p class="text-center text-sky-500 font-bold mt-10 animate-pulse">⏳ Đang nạp dữ liệu Hệ thống...</p>`;
                return;
            }

            // Nếu không có từ khóa: Hiển thị tối đa 100 kết quả đầu tiên
            if (!query) {
                renderResults(dataTTHC.slice(0, 100), resultsContainer, cardClass, codeClass); 
                return;
            }

            // 1. O(1) Tìm kiếm Băm (Hash) nếu người dùng nhập chính xác tuyệt đối Mã số
            if (tthcHashMap.has(query)) {
                renderResults([tthcHashMap.get(query)], resultsContainer, cardClass, codeClass);
                return;
            }

            // 2. Tìm kiếm chính xác theo cụm từ (Exact phrase search - không phân biệt dấu)
            const normalizedQuery = removeAccents(query);
            const exactResults = dataTTHC.filter(item => {
                const normalizedContent = removeAccents(item["Nội dung"]);
                const normalizedCode = removeAccents(item["Mã số"]);
                
                // Kiểm tra xem cụm từ khóa có nằm liền mạch trong nội dung hoặc mã số không
                return normalizedContent.includes(normalizedQuery) || normalizedCode.includes(normalizedQuery);
            });

            // Giới hạn kết quả hiển thị tránh đơ trang nếu từ khóa quá chung chung
            renderResults(exactResults.slice(0, 100), resultsContainer, cardClass, codeClass, exactResults.length);
        }

        // HÀM HIỂN THỊ KẾT QUẢ TÌM KIẾM CÓ CHỨC NĂNG SAO CHÉP
        function renderResults(data, container, cardClass, codeClass, totalFound = null) {
            if (data.length === 0) {
                container.innerHTML = `<p class="text-center text-red-500 font-bold mt-10">Không tìm thấy kết quả phù hợp cho từ khóa của bạn.</p>`;
                return;
            }

            let extraInfo = '';
            if(totalFound !== null && totalFound > 100) {
                extraInfo = `<p class="text-xs text-center text-sky-600 dark:text-sky-400 mb-4 font-bold italic">Tìm thấy ${totalFound} kết quả. Đang hiển thị 100 kết quả phù hợp nhất, vui lòng nhập chi tiết hơn để lọc.</p>`;
            }

            container.innerHTML = extraInfo + data.map(item => `
                <div class="p-4 rounded-xl border ${cardClass} flex flex-col md:flex-row gap-4 items-start md:items-center hover:-translate-y-0.5 transition-transform duration-200">
                    <div class="shrink-0 flex flex-col gap-2 w-full md:w-32">
                        <div class="px-3 py-1.5 rounded-lg font-black text-sm tracking-wider ${codeClass} text-center">
                            ${item["Mã số"]}
                        </div>
                        <button onclick="copyToClipboard('${item["Mã số"]}', this)" class="text-[10px] bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 font-bold py-1.5 px-2 rounded-lg flex items-center justify-center gap-1 transition-colors border border-slate-200 dark:border-slate-600">
                            <span>📋</span> Sao chép
                        </button>
                    </div>
                    <div class="font-medium text-sm leading-relaxed flex-1">
                        ${item["Nội dung"]}
                    </div>
                </div>
            `).join('');
        }

        // HÀM COPY MÃ SỐ VÀO CLIPBOARD
        window.copyToClipboard = function(text, buttonElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalHTML = buttonElement.innerHTML;
                buttonElement.innerHTML = `<span class="text-xs">✅</span> Đã chép`;
                buttonElement.classList.add('text-emerald-600', 'dark:text-emerald-400', 'border-emerald-300', 'dark:border-emerald-500', 'bg-emerald-50', 'dark:bg-emerald-900/30');
                
                setTimeout(() => {
                    buttonElement.innerHTML = originalHTML;
                    buttonElement.classList.remove('text-emerald-600', 'dark:text-emerald-400', 'border-emerald-300', 'dark:border-emerald-500', 'bg-emerald-50', 'dark:bg-emerald-900/30');
                }, 2000);
            }).catch(err => {
                console.error('Lỗi khi sao chép: ', err);
                alert('Không thể sao chép mã số.');
            });
        };

        // TRÌNH QUẢN LÝ SLIDER ẢNH QR
        let currentSlide = 1;
        const totalSlides = 6;
        
        window.moveSlide = function(direction) {
            currentSlide += direction;
            if (currentSlide > totalSlides) currentSlide = 1;
            if (currentSlide < 1) currentSlide = totalSlides;
            
            const imgEl = document.getElementById('qr-slide-img');
            const counterEl = document.getElementById('slide-counter');
            
            if (imgEl && counterEl) {
                imgEl.style.opacity = 0.2;
                setTimeout(() => {
                    imgEl.src = `hinh-anh/ma_qr_tthc_${currentSlide}.jpg`;
                    imgEl.alt = `Mã QR TTHC ${currentSlide}`;
                    counterEl.innerText = `HÌNH ${currentSlide} / ${totalSlides}`;
                    imgEl.style.opacity = 1;
                }, 150);
            }
        };

        // HÀM CHUYỂN ĐỔI THEME HEADER VÀ NỀN (XANH / ĐỎ TƯƠI)
        window.switchSystemTheme = function(modeName) {
            const body = document.getElementById('dynamic-body');
            const btnXanh = document.getElementById('btn-theme-xanh');
            const btnDo = document.getElementById('btn-theme-do');

            if (modeName === 'do') {
                body.classList.remove('theme-xanh-ios'); body.classList.add('theme-do-hanhchinh');
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-red-600 text-white shadow-md";
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white";
            } else {
                body.classList.remove('theme-do-hanhchinh'); body.classList.add('theme-xanh-ios');
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-blue-600 text-white shadow-md";
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white";
            }
        }

        // HÀM CHUYỂN ĐỔI THEME SÁNG / TỐI KHÔNG DÙNG MÀU ĐEN
        window.setTheme = function(themeName) {
            const body = document.getElementById('dynamic-body');
            const btnLight = document.getElementById('btn-theme-light');
            const btnDark = document.getElementById('btn-theme-dark');

            if(themeName === 'light') {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition bg-white text-blue-900 shadow-sm border border-blue-200";
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition border border-transparent text-slate-500 hover:text-blue-900 dark:text-sky-200 dark:hover:text-white";
            } else {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition bg-sky-600 text-white shadow-sm border border-sky-500";
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition border border-transparent text-sky-400 hover:text-sky-300";
            }

            const activeTabBtn = document.querySelector('.tab-btn.active');
            if(activeTabBtn) {
                if(activeTabBtn.innerText.includes('TT Phục vụ Hành chính công')) changeContent('intro', '', activeTabBtn);
                else if(activeTabBtn.innerText.includes('Mã QR')) changeContent('qr-slider', '', activeTabBtn);
                else if(activeTabBtn.innerText.includes('Hướng dẫn')) changeContent('accordion-guide', '', activeTabBtn);
                else if(activeTabBtn.innerText.includes('Tra cứu')) changeContent('search-tthc', '', activeTabBtn);
                else if(activeTabBtn.innerText.includes('Cổng DVC')) changeContent('lookup-links', '', activeTabBtn);
            }
        }

        // HÀM ĐỔI TAB NỘI DUNG TTHC CÓ THÍCH ỨNG THEME
        function changeContent(type, sourceUrl, buttonElement) {
            const viewport = document.getElementById('viewer-viewport');
            const isDark = document.body.classList.contains('dark-theme');
            const isRedTheme = document.body.classList.contains('theme-do-hanhchinh') && !isDark;
            const titleClass = isDark ? "text-sky-400" : (isRedTheme ? "text-[#da251d]" : "text-[#0b4a8f]");
            const lineClass = isRedTheme ? "bg-[#da251d]" : "bg-sky-500";
            
            if (type === 'intro') {
                const textClass = isDark ? "text-sky-100" : "text-slate-700";
                viewport.innerHTML = `
                    <div class="p-6 md:p-12 flex flex-col items-center justify-start h-full space-y-8 overflow-y-auto">
                        <div class="text-center mb-2">
                            <h3 class="text-xl md:text-2xl lg:text-3xl font-black uppercase tracking-wide ${titleClass}">Trung tâm Phục vụ Hành chính công xã Bình Hưng</h3>
                            <div class="h-1.5 w-24 ${lineClass} mx-auto mt-4 rounded-full"></div>
                        </div>
                        <div class="max-w-4xl text-sm md:text-base leading-relaxed md:leading-loose text-justify font-medium ${textClass} space-y-5">
                            <p>Trung tâm Phục vụ Hành chính công xã Bình Hưng được thành lập với mục tiêu đổi mới phương thức phục vụ nhân dân, lấy người dân và doanh nghiệp làm trung tâm. Trung tâm là đầu mối tập trung để tiếp nhận, hướng dẫn, giải quyết và trả kết quả giải quyết thủ tục hành chính, đảm bảo sự nhanh chóng, minh bạch và hiệu quả.</p>
                            <p>Chúng tôi ứng dụng mạnh mẽ công nghệ thông tin, chuyển đổi số và liên thông dữ liệu nhằm cắt giảm thời gian chờ đợi, nâng cao tính công khai trong hoạt động của bộ máy hành chính nhà nước. Người dân có thể dễ dàng tra cứu, theo dõi tiến độ hồ sơ ngay trên các thiết bị di động.</p>
                            <p>Với phương châm <span class="font-black ${isRedTheme ? "text-[#da251d]" : "text-sky-600 dark:text-sky-400"}">"Chuyên nghiệp - Tận tâm - Chính xác - Đúng hẹn"</span>, đội ngũ cán bộ, công chức của Trung tâm luôn sẵn sàng hỗ trợ, tư vấn và cam kết mang đến sự hài lòng cao nhất cho mọi tổ chức và công dân đến giao dịch.</p>
                        </div>
                    </div>
                `;

            } else if (type === 'qr-slider') {
                currentSlide = 1; 
                viewport.innerHTML = `
                    <div class="w-full h-full flex flex-col items-center justify-start p-6 md:p-10 relative">
                        <h3 class="text-lg md:text-xl font-black uppercase tracking-wide mb-6 md:mb-8 text-center ${titleClass}">Quét Mã QR - Tra cứu nhanh Thủ tục Hành chính</h3>
                        
                        <div class="relative w-full max-w-3xl flex items-center justify-center">
                            <button onclick="moveSlide(-1)" class="absolute -left-2 md:-left-12 z-10 w-10 h-10 md:w-12 md:h-12 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-full shadow-md hover:bg-slate-50 dark:hover:bg-slate-600 flex items-center justify-center text-xl text-sky-600 dark:text-sky-300 font-bold transition-transform hover:scale-110">❮</button>
                            
                            <div class="overflow-hidden relative w-full aspect-[4/5] md:aspect-video rounded-2xl shadow-inner border-[6px] border-white dark:border-slate-700 flex items-center justify-center bg-slate-100 dark:bg-slate-800">
                                <img id="qr-slide-img" src="hinh-anh/ma_qr_tthc_1.jpg" alt="Mã QR TTHC 1" class="w-full h-full object-contain transition-opacity duration-300" onerror="this.src='https://via.placeholder.com/1200x800.png?text=Hinh+Anh+Ma+QR+TTHC+1'">
                            </div>
                            
                            <button onclick="moveSlide(1)" class="absolute -right-2 md:-right-12 z-10 w-10 h-10 md:w-12 md:h-12 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-full shadow-md hover:bg-slate-50 dark:hover:bg-slate-600 flex items-center justify-center text-xl text-sky-600 dark:text-sky-300 font-bold transition-transform hover:scale-110">❯</button>
                        </div>

                        <div class="mt-8">
                            <span id="slide-counter" class="bg-slate-900/10 dark:bg-sky-500/20 text-slate-800 dark:text-sky-200 px-5 py-2 rounded-full text-sm font-bold border border-slate-200 dark:border-sky-500/30 shadow-sm tracking-wider">HÌNH 1 / 6</span>
                        </div>
                    </div>
                `;

            } else if (type === 'search-tthc') {
                const searchBg = isDark ? 'bg-slate-800 border-slate-600 text-white' : 'bg-white border-slate-300 text-slate-900';
                
                viewport.innerHTML = `
                    <div class="p-6 md:p-10 flex flex-col items-center h-full">
                        <div class="text-center mb-6">
                            <h3 class="text-xl md:text-2xl font-black uppercase tracking-wide ${titleClass}">Tra cứu Cơ sở Dữ liệu TTHC</h3>
                            <div class="h-1.5 w-16 ${lineClass} mx-auto mt-4 rounded-full"></div>
                        </div>
                        
                        <div class="w-full max-w-4xl flex flex-col md:flex-row gap-3 mb-8">
                            <div class="relative flex-1">
                                <span class="absolute left-4 top-3.5 text-slate-400">🔍</span>
                                <input type="text" id="searchInput" placeholder="Nhập mã số (VD: 3.000580) hoặc tên thủ tục..." 
                                    class="w-full p-3.5 pl-11 border rounded-xl shadow-sm focus:ring-4 focus:ring-sky-500/20 outline-none transition-all ${searchBg}"
                                    onkeypress="if(event.key === 'Enter') executeSearch()">
                            </div>
                            <button onclick="executeSearch()" class="px-8 py-3.5 bg-sky-600 hover:bg-sky-700 text-white font-bold rounded-xl shadow-md transition-colors shrink-0">
                                TÌM KIẾM
                            </button>
                        </div>
                        
                        <div id="searchResults" class="w-full max-w-4xl flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-2 pb-4">
                            </div>
                    </div>
                `;
                
                // Khởi chạy ngay hiển thị kết quả mặc định
                setTimeout(executeSearch, 50);

            } else if (type === 'accordion-guide') {
                const guides = [
                    "HƯỚNG DẪN ĐĂNG NHẬP CỔNG DỊCH VỤ CÔNG QUỐC GIA",
                    "ĐĂNG KÝ KHAI SINH",
                    "CẤP BẢN SAO TRÍCH LỤC HỘ TỊCH, BẢN SAO GIẤY KHAI SINH",
                    "THỦ TỤC ĐĂNG KÝ KHAI TỬ",
                    "QUY TRÌNH CHỨNG THỰC BẢN SAO ĐIỆN TỬ TOÀN TRÌNH",
                    "QUY TRÌNH THỰC HIỆN THỦ TỤC HÀNH CHÍNH CUNG CẤP THÔNG TIN QUY HOẠCH TRỰC TUYẾN TOÀN TRÌNH",
                    "QUY TRÌNH CẤP PHÉP XÂY DỰNG TRỰC TUYẾN",
                    "HƯỚNG DẪN TRA CỨU BẢO HIỂM Y TẾ",
                    "QUY TRÌNH CẤP GIẤY ĐĂNG KÝ HỘ KINH DOANH",
                    "QUY TRÌNH CẤP GIẤY CHỨNG NHẬN QUYỀN SỬ DỤNG ĐẤT, QUYỀN SỞ HỮU NHÀ Ở VÀ TÀI SẢN GẮN LIỀN VỚI ĐẤT (LẦN ĐẦU)"
                ];

                let html = `<div class="p-6 space-y-4">`;
                guides.forEach((title, index) => {
                    const isFirst = (index === 0);
                    const hiddenClass = isFirst ? '' : 'hidden';
                    const arrowIcon = isFirst ? '▲' : '▼';

                    html += `
                        <div class="border rounded-xl overflow-hidden shadow-sm transition-all duration-300 acc-btn">
                            <button onclick="toggleAccordion(${index + 1})" class="w-full flex justify-between items-center px-5 py-4 font-bold text-xs uppercase transition-colors text-left">
                                <span class="mr-4 leading-relaxed">${index + 1}. ${title}</span>
                                <span id="arrow-${index + 1}" class="opacity-70 text-sm font-black shrink-0">${arrowIcon}</span>
                            </button>
                            <div id="content-${index + 1}" class="${hiddenClass} acc-content p-4 md:p-6 border-t transition-all">
                                <img src="hinh-anh/huongdan${index + 1}.png" alt="Hướng dẫn ${index + 1}" class="w-full h-auto rounded-xl shadow-sm border border-slate-200/60 dark:border-slate-600" onerror="this.onerror=null; this.src='https://via.placeholder.com/800x400.png?text=Hinh+Anh+Huong+Dan+Thu+Tuc+${index + 1}'">
                            </div>
                        </div>`;
                });
                html += `</div>`;
                viewport.innerHTML = html;

            } else if (type === 'lookup-links') {
                const subTextClass = isDark ? "text-sky-200" : "text-slate-500";
                
                viewport.innerHTML = `
                    <div class="p-6 md:p-10 flex flex-col items-center justify-start h-full rounded-xl">
                        <div class="text-center mb-10">
                            <h3 class="text-xl md:text-2xl font-black uppercase tracking-wide ${titleClass}">Cổng Tra cứu Trực tuyến</h3>
                            <div class="h-1.5 w-16 ${lineClass} mx-auto mt-4 rounded-full"></div>
                        </div>
                        
                        <div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-8">
                            <a href="https://baohiemxahoi.gov.vn/tracuu/Pages/tra-cuu-thoi-han-su-dung-the-bhyt.aspx" target="_blank" class="w-full lookup-card p-6 lg:p-8 rounded-2xl flex flex-col items-center text-center shadow-sm hover:shadow-xl transition-all duration-300 group border-2">
                                <div class="w-16 h-16 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner mb-5 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3 shrink-0">🏥</div>
                                <span class="font-black uppercase text-sm lg:text-base group-hover:text-sky-500 transition-colors mb-2">Tra cứu BHYT</span>
                                <span class="text-xs lg:text-sm ${subTextClass} font-medium leading-relaxed mb-6 flex-grow">Tra cứu thời hạn sử dụng thẻ Bảo hiểm Y tế</span>
                                <span class="inline-flex items-center justify-center bg-slate-100 dark:bg-slate-800 group-hover:bg-sky-500 text-slate-500 dark:text-sky-300 group-hover:text-white px-4 py-2 rounded-full text-xs font-bold transition-colors">
                                    Truy cập ngay <span class="ml-1 transition-transform group-hover:translate-x-1">➔</span>
                                </span>
                            </a>
                            <a href="https://baohiemxahoi.gov.vn/tracuu/Pages/tra-cuu-ho-gia-dinh.aspx" target="_blank" class="w-full lookup-card p-6 lg:p-8 rounded-2xl flex flex-col items-center text-center shadow-sm hover:shadow-xl transition-all duration-300 group border-2">
                                <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner mb-5 transition-transform duration-300 group-hover:scale-110 group-hover:-rotate-3 shrink-0">📘</div>
                                <span class="font-black uppercase text-sm lg:text-base group-hover:text-emerald-500 transition-colors mb-2">Tra cứu số sổ BHXH</span>
                                <span class="text-xs lg:text-sm ${subTextClass} font-medium leading-relaxed mb-6 flex-grow">Tra cứu mã số Bảo hiểm Xã hội cá nhân</span>
                                <span class="inline-flex items-center justify-center bg-slate-100 dark:bg-slate-800 group-hover:bg-emerald-500 text-slate-500 dark:text-sky-300 group-hover:text-white px-4 py-2 rounded-full text-xs font-bold transition-colors">
                                    Truy cập ngay <span class="ml-1 transition-transform group-hover:translate-x-1">➔</span>
                                </span>
                            </a>
                            <a href="https://dichvucong.gov.vn" target="_blank" class="w-full lookup-card p-6 lg:p-8 rounded-2xl flex flex-col items-center text-center shadow-sm hover:shadow-xl transition-all duration-300 group border-2">
                                <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner mb-5 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3 shrink-0">🏛️</div>
                                <span class="font-black uppercase text-sm lg:text-base group-hover:text-amber-500 transition-colors mb-2">Cổng DVC Quốc gia</span>
                                <span class="text-xs lg:text-sm ${subTextClass} font-medium leading-relaxed mb-6 flex-grow">Kết nối trực tiếp Cổng Dịch vụ công Quốc gia</span>
                                <span class="inline-flex items-center justify-center bg-slate-100 dark:bg-slate-800 group-hover:bg-amber-500 text-slate-500 dark:text-sky-300 group-hover:text-white px-4 py-2 rounded-full text-xs font-bold transition-colors">
                                    Truy cập ngay <span class="ml-1 transition-transform group-hover:translate-x-1">➔</span>
                                </span>
                            </a>
                        </div>
                    </div>
                `;
            } else {
                viewport.innerHTML = `<object data="${sourceUrl}" type="application/pdf" width="100%" height="100%"></object>`;
            }

            // Đổi màu tab đang được chọn
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }

        // HÀM MỞ/ĐÓNG ACCORDION HƯỚNG DẪN
        window.toggleAccordion = function(id) {
            const content = document.getElementById(`content-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            const isHidden = content.classList.contains('hidden');
            
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="arrow-"]').forEach(el => el.innerText = '▼');
            
            if (isHidden) { 
                content.classList.remove('hidden'); 
                arrow.innerText = '▲'; 
            }
        };

        // KÍCH HOẠT KHI TẢI TRANG
        document.addEventListener('DOMContentLoaded', function() {
            setTheme('light'); 
            loadTTHCData(); // Kích hoạt tải dữ liệu ngay từ đầu
            const firstTab = document.querySelector('.tab-btn');
            if (firstTab) firstTab.click();
        });
    </script>
</body>
</html>
