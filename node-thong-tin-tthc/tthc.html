<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Thủ tục hành chính - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', 'Be Vietnam Pro', sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; transition: background 0.4s ease, color 0.4s ease; }
        
        /* ================= KỸ THUẬT NỀN ĐỘNG GRADIENT TẠI HEADER ================= */
        body.theme-xanh-ios .main-header { background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; box-shadow: 0 4px 15px rgba(11, 74, 143, 0.15); border-bottom: 2px solid #032b5c; }
        body.theme-do-hanhchinh .main-header { background: linear-gradient(-45deg, #dc2626, #7f1d1d, #ef4444, #450a0a); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; box-shadow: 0 4px 15px rgba(220, 38, 38, 0.15); border-bottom: 2px solid #991b1b; }
        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* LOGO ANIMATION CHUYỂN ĐỘNG NHẸ */
        .logo-main { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2)); } 50% { transform: translateY(-3px); filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3)); } }

        /* KHỐI NỘI DUNG */
        .menu-panel-wrapper { background-color: rgba(128, 255, 232, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 40px; box-shadow: 0 20px 50px -10px rgba(12, 74, 110, 0.15); width: 100%; padding: 45px 35px; }
        .content-viewer-container { width: 100%; height: 750px; border-radius: 20px; overflow-y: auto; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08); border: 1px solid rgba(255, 255, 255, 0.5); background: #ffffff; }
        .tab-btn { background: white; border: 1px solid #e2e8f0; color: #334155; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; padding: 12px 24px; border-radius: 12px; transition: all 0.2s; white-space: nowrap; }
        .tab-btn.active { background: #1e40af; color: white; border-color: #1e40af; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.3); border-radius: 10px; }

        @media (max-width: 1024px) {
            .header-layout { flex-direction: column !important; }
            .theme-selector-vertical { position: relative !important; top: 0 !important; right: 0 !important; margin-top: 16px; flex-direction: row !important; space-x: 2; width: auto !important; }
            .theme-selector-vertical button { margin-left: 4px; margin-right: 4px; }
            .menu-panel-wrapper { padding: 25px 20px; }
        }
    </style>
</head>
<body class="theme-xanh-ios bg-slate-50 custom-scrollbar" id="dynamic-body">

    <header class="main-header w-full py-6 px-6 md:px-12 select-none relative transition-all duration-300">
        <div class="max-w-[1550px] mx-auto flex flex-col items-center justify-center relative header-layout">
            
            <div class="flex flex-row items-center space-x-6 w-auto">
                <div class="flex-shrink-0">
                    <img src="logo.png" alt="Logo" class="logo-main w-20 h-auto" onerror="this.src='logo.png'">
                </div>
                <div class="flex flex-col items-start justify-center space-y-2 text-left">
                    <p class="text-white font-black tracking-[0.12em] text-xl md:text-2xl lg:text-3xl uppercase leading-none m-0 p-0 drop-shadow-[0_2px_4px_rgba(0,0,0,0.3)] font-['Montserrat']">
                        IOC BINH HUNG
                    </p>
                    <h1 class="title-main text-sm md:text-base lg:text-lg font-bold uppercase tracking-[0.08em] text-white/90 leading-tight m-0 p-0 drop-shadow-[0_2px_4px_rgba(0,0,0,0.2)]">
                        Cổng thông tin và điều hành xã Bình Hưng, Thành phố Hồ Chí Minh
                    </h1>
                </div>
            </div>

            <div class="theme-selector-vertical lg:absolute lg:top-0 lg:right-0 bg-white/10 backdrop-blur-md border border-white/20 p-1.5 rounded-xl flex flex-col space-y-1.5 w-[75px] z-20 shadow-inner">
                <button onclick="switchSystemTheme('xanh')" id="btn-theme-xanh" class="w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-blue-600 text-white shadow-md">🔵 Xanh</button>
                <button onclick="switchSystemTheme('do')" id="btn-theme-do" class="w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white">🔴 Đỏ</button>
            </div>
            
        </div>
    </header>

    <div class="max-w-[1550px] w-full mx-auto px-4 md:px-6 mt-6 mb-4">
        <div class="py-4 md:py-5 px-8 text-center shadow-lg rounded-2xl bg-teal-500 border-b-4 border-teal-600">
            <h2 class="font-['Montserrat'] text-xl md:text-3xl font-black text-white uppercase tracking-wider leading-tight">
                THÔNG TIN LIÊN QUAN THỦ TỤC HÀNH CHÍNH
            </h2>
        </div>
    </div>

    <div class="max-w-[1550px] w-full mx-auto px-4 md:px-6 my-2 pb-12 flex flex-col flex-grow">

        <article class="menu-panel-wrapper flex flex-col space-y-6">
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-white/40 pb-4">
                <a href="../home.html" class="inline-flex items-center gap-2 bg-white/80 backdrop-blur hover:bg-white border border-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-bold text-xs uppercase tracking-wider shadow-sm transition-all duration-300 hover:-translate-y-0.5 shrink-0">
                    ⬅️ Quay lại Trang chủ
                </a>
                          </div>
            
            <div class="flex flex-row gap-3 overflow-x-auto pb-2 custom-scrollbar">
                <button onclick="changeContent('accordion-guide', '', this)" class="tab-btn shrink-0">📖 Hướng dẫn TTHC</button>
                <button onclick="changeContent('pdf', 'danh-sach-tthc-2026-06-10-19-37.pdf', this)" class="tab-btn shrink-0">📦 Danh mục Thủ tục hành chính</button>
            </div>

            <div id="viewer-viewport" class="content-viewer-container"></div>
            <p id="helper-text" class="text-center text-xs font-bold text-blue-900 italic">💡 Hướng dẫn: Quét mã QR hoặc xem hướng dẫn chi tiết bên trên.</p>
        </article>
        
    </div>

    <footer class="w-full text-center py-6 text-slate-400 font-medium text-[11px] uppercase tracking-widest border-t border-slate-200 bg-white shadow-sm mt-auto">
        &copy; 2026 IOC BINH HƯNG — BẢN QUYỀN THUỘC UBND XÃ BÌNH HƯNG
    </footer>

    <script>
        // HÀM CHUYỂN ĐỔI THEME HEADER (XANH / ĐỎ)
        window.switchSystemTheme = function(modeName) {
            const body = document.getElementById('dynamic-body');
            const btnXanh = document.getElementById('btn-theme-xanh');
            const btnDo = document.getElementById('btn-theme-do');
            if (modeName === 'do') {
                body.classList.remove('theme-xanh-ios'); body.classList.add('theme-do-hanhchinh');
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-red-600 text-white shadow-md";
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white";
            } else {
                body.classList.remove('theme-do-hanhchinh'); body.classList.add('theme-xanh-ios');
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-blue-600 text-white shadow-md";
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white";
            }
        }

        // HÀM ĐỔI TAB NỘI DUNG TTHC
        function changeContent(type, sourceUrl, buttonElement) {
            const viewport = document.getElementById('viewer-viewport');
            
            if (type === 'accordion-guide') {
                const guides = [
                    "HƯỚNG DẪN ĐĂNG NHẬP CỔNG DỊCH VỤ CÔNG QUỐC GIA",
                    "ĐĂNG KÝ KHAI SINH",
                    "CẤP BẢN SAO TRÍCH LỤC HỘ TỊCH, BẢN SAO GIẤY KHAI SINH",
                    "THỦ TỤC ĐĂNG KÝ KHAI TỬ",
                    "QUY TRÌNH CHỨNG THỰC BẢN SAO ĐIỆN TỬ TOÀN TRÌNH",
                    "QUY TRÌNH THỰC HIỆN THỦ TỤC HÀNH CHÍNH CUNG CẤP THÔNG TIN QUY HOẠCH TRỰC TUYẾN TOÀN TRÌNH",
                    "HỖ TRỢ SINH ĐỦ 02 CON TRƯỚC 35 TUỔI",
                    "HƯỚNG DẪN TRA CỨU BẢO HIỂM Y TẾ"
                ];

                let html = `<div class="p-6 space-y-3">`;
                guides.forEach((title, index) => {
                    html += `
                        <div class="border border-slate-200 rounded-xl overflow-hidden bg-white">
                            <button onclick="toggleAccordion(${index + 1})" class="w-full flex justify-between items-center px-5 py-4 font-bold text-xs uppercase text-slate-800 hover:bg-slate-50 transition">
                                ${index + 1}. ${title}
                                <span id="arrow-${index + 1}" class="text-slate-400">▼</span>
                            </button>
                            <div id="content-${index + 1}" class="hidden p-4 border-t bg-slate-50 transition-all">
                                <img src="hinh-anh/huongdan${index + 1}.png" alt="Hướng dẫn" class="w-full h-auto rounded-lg shadow-sm" onerror="this.src='https://placehold.co/800x400?text=Chua+co+hinh+anh'">
                            </div>
                        </div>`;
                });
                html += `</div>`;
                viewport.innerHTML = html;
            } else {
                viewport.innerHTML = `<object data="${sourceUrl}" type="application/pdf" width="100%" height="100%"></object>`;
            }

            // Đổi màu tab đang được chọn
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }

        // HÀM MỞ/ĐÓNG ACCORDION HƯỚNG DẪN
        window.toggleAccordion = function(id) {
            const content = document.getElementById(`content-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            const isHidden = content.classList.contains('hidden');
            
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="arrow-"]').forEach(el => el.innerText = '▼');
            
            if (isHidden) { 
                content.classList.remove('hidden'); 
                arrow.innerText = '▲'; 
            }
        };

        // KÍCH HOẠT TAB ĐẦU TIÊN KHI TẢI TRANG (Vì đã đảo lên trước, nó sẽ mở Hướng dẫn TTHC)
        window.addEventListener('load', function() {
            const firstTab = document.querySelector('.tab-btn');
            if (firstTab) firstTab.click();
        });
    </script>
</body>
</html>
