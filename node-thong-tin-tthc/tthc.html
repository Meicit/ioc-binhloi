<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Thủ tục hành chính - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', 'Be Vietnam Pro', sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; transition: background 0.4s ease, color 0.4s ease; }
        .main-header { background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; box-shadow: 0 4px 15px rgba(11, 74, 143, 0.15); border-bottom: 2px solid #032b5c; }
        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .menu-panel-wrapper { background-color: rgba(128, 255, 232, 0.45); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 40px; box-shadow: 0 20px 50px -10px rgba(12, 74, 110, 0.15); width: 100%; padding: 45px 35px; }
        .content-viewer-container { width: 100%; height: 750px; border-radius: 20px; overflow-y: auto; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08); border: 1px solid rgba(255, 255, 255, 0.5); background: #ffffff; }
        .tab-btn { background: white; border: 1px solid #e2e8f0; color: #334155; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; padding: 12px 24px; border-radius: 12px; transition: all 0.2s; }
        .tab-btn.active { background: #1e40af; color: white; border-color: #1e40af; }
    </style>
</head>
<body class="bg-slate-50">

    <header class="main-header w-full py-6 px-6 md:px-12">
        <div class="max-w-[1550px] mx-auto flex flex-row items-center space-x-6">
            <img src="logo.png" alt="Logo" class="w-20 h-auto">
            <div class="flex flex-col items-start space-y-1 text-white">
                <p class="font-black tracking-[0.12em] text-xl md:text-3xl uppercase font-['Montserrat']">IOC BINH HUNG</p>
                <h1 class="text-sm font-bold uppercase tracking-[0.08em] opacity-90">Cổng thông tin và điều hành xã Bình Hưng</h1>
            </div>
        </div>
    </header>

    <div class="max-w-[1550px] w-full mx-auto px-4 md:px-6 my-6">
        <article class="menu-panel-wrapper flex flex-col space-y-6">
            <h2 class="text-2xl font-black text-[#0b4a8f] uppercase">Tra cứu bộ mã QR Thủ tục hành chính</h2>
            
            <div class="flex flex-row gap-2 overflow-x-auto pb-2">
                <button onclick="changeContent('search-tool', '', this)" class="tab-btn">🔍 Tra cứu Thủ tục hành chính công</button>
                <button onclick="changeContent('pdf', 'danh-sach-tthc-2026-06-10-19-37.pdf', this)" class="tab-btn">📦 Danh mục Thủ tục hành chính</button>
                <button onclick="changeContent('accordion-guide', '', this)" class="tab-btn">📖 Hướng dẫn TTHC</button>
            </div>

            <div id="dynamic-search-box" class="w-full max-w-2xl mx-auto bg-white p-4 rounded-2xl border border-slate-200 shadow-md hidden flex-row gap-3 items-center">
                <input type="text" id="search_input" placeholder="Nhập tên thủ tục cần tìm..." class="w-full bg-slate-50 border rounded-xl px-4 py-3 text-sm">
                <button onclick="executeUrlSearch()" class="bg-blue-800 text-white font-bold px-6 py-3 rounded-xl">Tìm</button>
            </div>

            <div id="viewer-viewport" class="content-viewer-container"></div>
            <p id="helper-text" class="text-center text-xs font-bold text-blue-900 italic">💡 Hướng dẫn: Quét mã QR hoặc tra cứu trực tuyến.</p>
        </article>
    </div>

    <script>
        function changeContent(type, sourceUrl, buttonElement) {
            const viewport = document.getElementById('viewer-viewport');
            const searchBox = document.getElementById('dynamic-search-box');
            
            if (type === 'search-tool') {
                searchBox.classList.remove('hidden'); searchBox.classList.add('flex');
                viewport.innerHTML = `<div class="p-10 text-center font-bold">Vui lòng nhập từ khóa tìm kiếm.</div>`;
            } else if (type === 'accordion-guide') {
                searchBox.classList.add('hidden');
                const guides = [
                    "HƯỚNG DẪN ĐĂNG NHẬP CỔNG DỊCH VỤ CÔNG QUỐC GIA",
                    "ĐĂNG KÝ KHAI SINH",
                    "CẤP BẢN SAO TRÍCH LỤC HỘ TỊCH, BẢN SAO GIẤY KHAI SINH",
                    "THỦ TỤC ĐĂNG KÝ KHAI TỬ",
                    "QUY TRÌNH CHỨNG THỰC BẢN SAO ĐIỆN TỬ TOÀN TRÌNH",
                    "QUY TRÌNH THỰC HIỆN THỦ TỤC HÀNH CHÍNH CUNG CẤP THÔNG TIN QUY HOẠCH TRỰC TUYẾN TOÀN TRÌNH",
                    "HỖ TRỢ SINH ĐỦ 02 CON TRƯỚC 35 TUỔI",
                    "HƯỚNG DẪN TRA CỨU BẢO HIỂM Y TẾ"
                ];

                let html = `<div class="p-6 space-y-3">`;
                guides.forEach((title, index) => {
                    html += `
                        <div class="border border-slate-200 rounded-xl overflow-hidden bg-white">
                            <button onclick="toggleAccordion(${index + 1})" class="w-full flex justify-between items-center px-5 py-4 font-bold text-xs uppercase text-slate-800 hover:bg-slate-50">
                                ${index + 1}. ${title}
                                <span id="arrow-${index + 1}">▼</span>
                            </button>
                            <div id="content-${index + 1}" class="hidden p-4 border-t bg-slate-50">
                                <img src="icon/huongdan${index + 1}.png" alt="Hướng dẫn" class="w-full h-auto rounded-lg" onerror="this.src='https://placehold.co/800x400?text=Chua+co+hinh+anh'">
                            </div>
                        </div>`;
                });
                html += `</div>`;
                viewport.innerHTML = html;
            } else {
                searchBox.classList.add('hidden');
                viewport.innerHTML = `<object data="${sourceUrl}" type="application/pdf" width="100%" height="100%"></object>`;
            }

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }

        window.toggleAccordion = function(id) {
            const content = document.getElementById(`content-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            const isHidden = content.classList.contains('hidden');
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="arrow-"]').forEach(el => el.innerText = '▼');
            if (isHidden) { content.classList.remove('hidden'); arrow.innerText = '▲'; }
        };

        window.addEventListener('load', function() {
            const firstTab = document.querySelector('.tab-btn');
            if (firstTab) firstTab.click();
        });

        function executeUrlSearch() {
            const keyword = document.getElementById('search_input').value;
            window.open(`https://dichvucong.gov.vn/p/home/dvc-tra-cuu-thu-tuc.html?keyword=${keyword}`, '_blank');
        }
    </script>
</body>
</html>
