<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Phản Ánh - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Be Vietnam Pro', sans-serif; margin: 0; padding: 0; min-height: 100vh; background-color: #f8fafc; color: #0f172a; display: flex; flex-direction: column; transition: background 0.4s ease; }
        body.theme-xanh-ios .main-header { background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; box-shadow: 0 4px 15px rgba(11, 74, 143, 0.15); border-bottom: 2px solid #032b5c; }
        body.theme-do-hanhchinh .main-header { background: linear-gradient(-45deg, #dc2626, #7f1d1d, #ef4444, #450a0a); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; border-bottom: 2px solid #991b1b; }
        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .menu-panel-wrapper { background-color: rgba(128, 255, 232, 0.45); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 40px; box-shadow: 0 20px 50px -10px rgba(12, 74, 110, 0.15); }
    </style>
</head>
<body class="theme-xanh-ios" id="dynamic-body">

    <header class="main-header w-full py-6 px-6 md:px-12 select-none relative transition-all duration-300">
        <div class="max-w-[1550px] mx-auto flex flex-col md:flex-row items-center justify-between relative header-layout">
            <div class="flex flex-row items-center space-x-6 w-auto">
                <div class="flex-shrink-0"><img src="../logo.png" alt="Logo" class="w-20 h-auto"></div>
                <div class="flex flex-col items-start justify-center space-y-2 text-left">
                    <p class="text-white font-black tracking-[0.12em] text-xl md:text-2xl lg:text-3xl uppercase leading-none drop-shadow-[0_2px_4px_rgba(0,0,0,0.3)] font-['Montserrat']">IOC BINH HUNG</p>
                    <h1 class="title-main text-sm md:text-base lg:text-lg font-bold uppercase tracking-[0.08em] text-white/90 leading-tight drop-shadow-[0_2px_4px_rgba(0,0,0,0.2)]">Cổng thông tin và điều hành xã Bình Hưng</h1>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-[1000px] w-full mx-auto px-4 md:px-6 my-8 flex-grow">
        <div class="menu-panel-wrapper p-6 md:p-10 space-y-6">
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full">
                <a href="dieu-phoi.html" class="inline-flex items-center gap-2 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-bold text-xs uppercase tracking-wider shadow-sm transition-all duration-300 hover:-translate-y-0.5 shrink-0">
                    ⬅️ Quay lại
                </a>
                <a href="lookup.html" class="bg-white/80 text-slate-700 hover:text-blue-700 hover:bg-white px-6 py-2.5 rounded-xl border border-white shadow-sm text-xs font-bold uppercase transition-all whitespace-nowrap">
                    🔍 Tra cứu tiến độ
                </a>
            </div>

            <div class="bg-white/95 backdrop-blur-xl border border-white rounded-3xl p-6 md:p-8 shadow-lg w-full">
                <div class="border-b border-slate-200/60 pb-4 mb-6 text-center">
                    <h2 class="text-xl md:text-2xl font-black text-blue-900 uppercase tracking-wide">Gửi phản ánh trực tuyến</h2>
                    <p class="text-xs font-medium text-slate-500 mt-2">Dữ liệu sẽ được mã hóa và gửi đến cơ quan quản lý nhà nước Xã Bình Hưng.</p>
                </div>

                <form id="complaintForm" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="text-xs font-bold text-slate-700 block mb-2">Họ và tên công dân <span class="text-red-500">*</span></label>
                            <input type="text" id="fullname" required placeholder="Nguyễn Văn A" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-900 outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-700 block mb-2">Số định danh CCCD <span class="text-red-500">*</span></label>
                            <input type="text" id="cccd" required placeholder="079xxxxxxxx" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-900 outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-700 block mb-2">Địa chỉ Email <span class="text-red-500">*</span></label>
                        <input type="email" id="email" required placeholder="name@tphcm.gov.vn" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-900 outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-700 block mb-2">Nội dung phản ánh <span class="text-red-500">*</span></label>
                        <textarea id="content" rows="5" required placeholder="Mô tả chi tiết..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-900 outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition leading-relaxed"></textarea>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-700 block mb-2">Hình ảnh hiện trường đính kèm</label>
                        <input type="file" id="imageFile" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-black file:uppercase file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition cursor-pointer">
                    </div>
                    <div class="pt-4 max-w-sm mx-auto">
                        <button type="submit" id="submitBtn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-extrabold text-sm uppercase tracking-wider py-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2">
                            <span>Gửi phản ánh ngay</span> 🚀
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    </body>
</html>
