<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều phối Phản ánh - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================= QUẢN LÝ MÀU NỀN TỔNG THỂ ================= */
        body { font-family: 'Inter', 'Be Vietnam Pro', sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; transition: background-color 0.4s ease, color 0.4s ease; }
        body.light-theme { background-color: #f8fafc; color: #334155; }
        body.dark-theme { background-color: #082f49; color: #bae6fd; }

        /* ================= HEADER GRADIENT ================= */
        body.light-theme.theme-xanh .main-header { background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; border-bottom: 2px solid #032b5c; box-shadow: 0 4px 15px rgba(11, 74, 143, 0.3); }
        body.light-theme.theme-do .main-header { background: linear-gradient(-45deg, #da251d, #a81c15, #ff3b33, #7a120e); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; border-bottom: 2px solid #a81c15; box-shadow: 0 4px 15px rgba(218, 37, 29, 0.4); }
        body.dark-theme .main-header { background: linear-gradient(-45deg, #020617, #0f172a, #082f49, #020617); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; border-bottom: 2px solid #082f49; box-shadow: 0 4px 15px rgba(8, 47, 73, 0.5); }
        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* ================= KHỐI NỘI DUNG KÍNH MỜ ================= */
        .menu-panel-wrapper { backdrop-filter: blur(20px); border: 1px solid; border-radius: 40px; width: 100%; transition: all 0.5s ease; padding: 32px; }
        
        /* 1. SÁNG + XANH */
        body.light-theme.theme-xanh .menu-panel-wrapper { background: rgba(14, 165, 233, 0.05); border-color: rgba(14, 165, 233, 0.2); }
        /* 2. SÁNG + ĐỎ */
        body.light-theme.theme-do .menu-panel-wrapper { background: rgba(218, 37, 29, 0.08); border-color: rgba(218, 37, 29, 0.3); }
        /* 3. TỐI */
        body.dark-theme .menu-panel-wrapper { background: rgba(12, 74, 110, 0.5); border-color: rgba(56, 189, 248, 0.2); }

        /* NÚT BẤM CÁC CỔNG */
        .action-card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(14, 165, 233, 0.2); border-radius: 24px; padding: 32px; transition: all 0.3s; text-align: center; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        body.dark-theme .action-card { background: rgba(15, 23, 42, 0.6); border-color: rgba(56, 189, 248, 0.2); }
        .action-card:hover { transform: translateY(-5px); box-shadow: 0 20px 35px -5px rgba(14,165,233,0.2); }

        /* BỘ ĐIỀU KHIỂN */
        .btn-back-interactive { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 12px; font-weight: 800; font-size: 12px; text-transform: uppercase; border: 1px solid; transition: 0.4s; }
        .theme-switcher-panel { padding: 4px; border-radius: 12px; display: flex; align-items: center; border: 1px solid; transition: 0.3s; }
        .btn-view-mode { padding: 6px 12px; border-radius: 8px; font-weight: 800; font-size: 11px; text-transform: uppercase; }
        .active { background: #0b4a8f; color: white; }
    </style>
</head>
<body class="light-theme theme-xanh" id="dynamic-body">

    <header class="main-header w-full py-6 px-12 select-none">
        <div class="max-w-[1550px] mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-6">
                <img src="../logo.png" alt="Logo" class="w-20">
                <p class="text-white font-black text-xl md:text-3xl uppercase tracking-widest drop-shadow-md">IOC BINH HUNG</p>
            </div>
            <!-- Nút chọn theme -->
            <div class="bg-white/10 p-1.5 rounded-xl flex gap-1.5">
                <button onclick="switchSystemTheme('xanh')" id="btn-theme-xanh" class="btn-view-mode active">🔵 Xanh</button>
                <button onclick="switchSystemTheme('do')" id="btn-theme-do" class="btn-view-mode">🔴 Đỏ</button>
            </div>
        </div>
    </header>

    <div class="max-w-[1550px] w-full mx-auto px-6 mt-8 flex-grow">
        <!-- ĐIỀU KHIỂN SÁNG TỐI -->
        <div class="flex justify-between items-center mb-6">
            <a href="../index.html" class="btn-back-interactive border-slate-300">⬅️ Quay lại</a>
            <div class="theme-switcher-panel">
                <button onclick="setTheme('light')" id="btn-theme-light" class="btn-view-mode active">☀️ Sáng</button>
                <button onclick="setTheme('dark')" id="btn-theme-dark" class="btn-view-mode">🌙 Tối</button>
            </div>
        </div>

        <div class="menu-panel-wrapper p-12 space-y-8">
            <h1 class="text-3xl font-black uppercase text-center text-slate-800 dark:text-white">Điều phối Phản ánh</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <a href="phan-anh.html" class="action-card">
                    <div class="text-4xl mb-4">✍️</div>
                    <h4 class="font-bold uppercase mb-2">Gửi Phản Ánh</h4>
                    <p class="text-xs text-slate-500">Gửi trực tiếp đến chuyên viên xử lý.</p>
                </a>
                <a href="ds-can-bo.html" class="action-card">
                    <div class="text-4xl mb-4">👨‍💼</div>
                    <h4 class="font-bold uppercase mb-2">Danh sách Cán bộ</h4>
                    <p class="text-xs text-slate-500">Liên hệ chuyên viên phụ trách.</p>
                </a>
                <a href="https://1022.tphcm.gov.vn/" target="_blank" class="action-card">
                    <div class="text-4xl mb-4">🏛️</div>
                    <h4 class="font-bold uppercase mb-2">Cổng Phản Ánh 1022</h4>
                    <p class="text-xs text-slate-500">Hệ thống của Thành phố.</p>
                </a>
            </div>
        </div>
    </div>

    <script>
        window.switchSystemTheme = (mode) => {
            const body = document.getElementById('dynamic-body');
            body.classList.remove('theme-xanh', 'theme-do');
            body.classList.add(mode === 'do' ? 'theme-do' : 'theme-xanh');
            document.querySelectorAll('.btn-view-mode').forEach(b => b.classList.remove('active'));
            document.getElementById(mode === 'do' ? 'btn-theme-do' : 'btn-theme-xanh').classList.add('active');
        };

        window.setTheme = (mode) => {
            document.body.classList.remove('light-theme', 'dark-theme');
            document.body.classList.add(mode === 'dark' ? 'dark-theme' : 'light-theme');
        };
    </script>
</body>
</html>
