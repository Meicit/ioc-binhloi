<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }</style>
</head>
<body class="p-1">
    <div class="bg-white p-5 rounded-[30px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-amber-50 flex flex-col h-[190px] justify-between">
        <div>
            <div class="flex items-center gap-2 mb-3">
                <div class="w-6 h-6 bg-amber-500 rounded-lg flex items-center justify-center text-white text-[10px] shadow-lg shadow-amber-100">📂</div>
                <h3 class="text-[10px] font-black text-amber-900 uppercase tracking-[0.15em]">Đơn thư & Tiếp dân</h3>
            </div>
            <p id="dt_tong" class="text-3xl font-[900] text-slate-900 tracking-tighter leading-tight italic">Đang tải...</p>
            <p id="dt_rate" class="text-[11px] text-amber-600 font-extrabold italic mt-1 uppercase tracking-wider italic">Đang cập nhật...</p>
        </div>

        <div class="pt-3 border-t border-amber-50 flex justify-between items-center">
            <div class="flex gap-2">
                <span id="dt_xong" class="bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-md border border-emerald-100 text-[10px] font-black italic">Đã GQ: 0</span>
                <span id="dt_cho" class="bg-rose-50 text-rose-700 px-2 py-0.5 rounded-md border border-rose-100 text-[10px] font-black italic uppercase">Đang GQ: 0</span>
            </div>
            <span class="text-[8px] text-amber-300 font-black uppercase tracking-widest italic">Realtime</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // Cấu hình Firebase
        const firebaseConfig = { 
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Đảm bảo Node này tồn tại trên Firebase của bạn
        const donThuRef = ref(db, 'dashboard_binhhung/don_thu');

        onValue(donThuRef, (snap) => {
            const d = snap.val();
            console.log("Dữ liệu Đơn thư nhận được:", d); // Kiểm tra ở F12 Console

            if (d) {
                // Tính tỷ lệ giải quyết
                const tong = parseInt(d.tong) || 0;
                const daGQ = parseInt(d.da_giai_quyet) || 0;
                const chuaGQ = parseInt(d.chua_giai_quyet) || 0;
                
                const rate = tong > 0 ? ((daGQ / tong) * 100).toFixed(1) : 0;

                // Cập nhật giao diện
                document.getElementById('dt_tong').innerText = tong + " đơn thư";
                document.getElementById('dt_rate').innerText = "Giải quyết: " + rate + "%";
                document.getElementById('dt_xong').innerText = "Đã GQ: " + daGQ;
                document.getElementById('dt_cho').innerText = "Đang GQ: " + chuaGQ;
            } else {
                document.getElementById('dt_tong').innerText = "0 đơn thư";
                document.getElementById('dt_rate').innerText = "Chưa có dữ liệu";
            }
        }, (error) => {
            console.error("Lỗi Firebase:", error);
            document.getElementById('dt_tong').innerText = "Lỗi kết nối";
        });
    </script>
</body>
</html>
