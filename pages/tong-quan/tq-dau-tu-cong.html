<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }</style>
</head>
<body class="p-1">
    <div class="bg-white p-4 rounded-[24px] shadow-sm border border-slate-100 flex flex-col h-[190px] justify-between">
        <div>
            <div class="flex items-center gap-2 mb-2">
                <div class="w-7 h-7 bg-purple-100 rounded-lg flex items-center justify-center text-sm">🏗️</div>
                <h3 class="text-[11px] font-black text-gray-500 uppercase tracking-tight">Đầu tư công</h3>
            </div>
            
            <p id="dtc_von_nam" class="text-2xl font-[900] text-gray-900 tracking-tight leading-tight">0 tỷ VNĐ</p>
            <p class="text-[10px] font-bold text-blue-600 uppercase italic">Kế hoạch vốn năm 2026</p>
        </div>
        
        <div class="pt-2 border-t border-slate-50 flex justify-between items-end">
            <div class="flex flex-col">
                <div class="flex items-baseline gap-1">
                    <span class="text-[9px] font-black text-slate-400 uppercase">Tổng 5 năm:</span>
                    <span id="dtc_tong_giai_doan" class="text-[11px] font-black text-slate-700">0 tỷ</span>
                </div>
                <div class="flex items-baseline gap-1 mt-0.5">
                    <span class="text-[9px] font-black text-slate-400 uppercase">Số dự án:</span>
                    <span id="dtc_du_an" class="text-[11px] font-black text-purple-600">0</span>
                </div>
            </div>
            <span class="text-[8px] text-slate-300 uppercase font-black tracking-widest italic">2026-2030</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        // Cấu hình Firebase
        const firebaseConfig = { databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Trỏ vào đúng node dữ liệu chi tiết mà trang nhập liệu đã lưu
        const dtcRef = ref(db, 'dashboard_binhhung/dau_tu_cong_chi_tiet');

        onValue(dtcRef, (snap) => {
            const d = snap.val() || {};
            
            // Lấy dữ liệu từ Firebase
            const vonNam = d.von_nam || "0";
            const vonGiaiDoan = d.von_giai_doan || "0";
            const soDuAn = d.tong_du_an || "0";

            // Cập nhật giao diện
            document.getElementById('dtc_von_nam').innerText = vonNam + " tỷ VNĐ";
            document.getElementById('dtc_tong_giai_doan').innerText = vonGiaiDoan + " tỷ";
            document.getElementById('dtc_du_an').innerText = soDuAn;
        });
    </script>
</body>
</html>
