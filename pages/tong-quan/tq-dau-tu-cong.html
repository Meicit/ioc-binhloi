<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }
        .progress-bar { transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        /* Hiệu ứng đổ bóng nhẹ cho chữ để nổi bật trên nền trắng */
        .text-shadow-sm { text-shadow: 0 1px 1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-1">
    <div class="bg-white p-5 rounded-[30px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-indigo-50 flex flex-col h-[230px] justify-between">
        
        <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-[10px] shadow-lg shadow-indigo-200">🏗️</div>
                <h3 class="text-[10px] font-black text-indigo-900 uppercase tracking-[0.15em]">Đầu tư công</h3>
            </div>
            <div class="flex flex-wrap items-center gap-x-2 gap-y-1 mt-1">
                <p class="text-[14px] font-black text-slate-900 uppercase italic tracking-tighter text-shadow-sm">
                    Tổng: <span id="dtc_tong_du_an" class="text-indigo-600">0</span> dự án
                </p>
                <div id="dtc_linh_vuc" class="flex flex-wrap gap-x-2 text-[10px] font-extrabold text-indigo-400/80 italic">
                    </div>
            </div>
        </div>

        <div class="flex flex-col mt-1 bg-indigo-50/30 p-2 rounded-2xl border border-indigo-100/50">
            <span class="text-[9px] font-black text-indigo-800 uppercase leading-none mb-1.5 tracking-wider">Tổng đầu tư giai đoạn 2026-2030</span>
            <p id="dtc_von_gd" class="text-2xl font-[900] text-slate-900 tracking-tighter leading-tight italic">0 tỷ VNĐ</p>
        </div>

        <div class="flex justify-between items-end pt-2">
            <div class="flex flex-col">
                <span class="text-[9px] font-black text-blue-600 uppercase tracking-wide">Bố trí vốn 2026</span>
                <p id="dtc_von_nam" class="text-[20px] font-[900] text-blue-700 italic leading-none tracking-tighter">0 tỷ</p>
            </div>
            <div class="text-right">
                <span class="text-[9px] font-black text-emerald-600 uppercase tracking-wide">Đã thực hiện</span>
                <p id="dtc_da_thuc_hien" class="text-[16px] font-[900] text-emerald-600 italic leading-none tracking-tighter">0 tỷ</p>
            </div>
        </div>

        <div class="w-full mt-1">
            <div class="flex justify-between items-center mb-1.5 px-0.5">
                <span class="text-[9px] font-bold text-slate-800 uppercase italic tracking-widest">Tiến độ giải ngân 2026</span>
                <div class="flex items-center gap-1">
                    <span id="dtc_percent" class="text-[11px] font-black text-blue-700 italic">0%</span>
                </div>
            </div>
            <div class="w-full bg-blue-100/50 h-3 rounded-full overflow-hidden p-[2px] border border-blue-100">
                <div id="dtc_progress_bar" class="progress-bar h-full bg-gradient-to-r from-blue-600 via-indigo-600 to-violet-700 rounded-full shadow-[0_0_10px_rgba(37,99,235,0.3)]" style="width: 0%"></div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        const firebaseConfig = { databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dtcRef = ref(db, 'dashboard_binhhung/dau_tu_cong_chi_tiet');

        onValue(dtcRef, (snap) => {
            const d = snap.val() || {};
            
            document.getElementById('dtc_von_gd').innerText = (d.von_giai_doan || 0) + " tỷ VNĐ";
            document.getElementById('dtc_von_nam').innerText = (d.von_nam || 0) + " tỷ";
            document.getElementById('dtc_tong_du_an').innerText = d.tong_du_an || 0;

            const daThucHien = d.da_thuc_hien || (parseFloat(d.von_nam || 0) * 0.244).toFixed(2);
            const percent = d.von_nam > 0 ? ((daThucHien / d.von_nam) * 100).toFixed(1) : 0;

            document.getElementById('dtc_da_thuc_hien').innerText = daThucHien + " tỷ";
            document.getElementById('dtc_percent').innerText = percent + "%";
            document.getElementById('dtc_progress_bar').style.width = percent + "%";

            if (d.projects && Array.isArray(d.projects)) {
                const counts = {};
                d.projects.forEach(p => {
                    const name = p.type || 'Khác';
                    counts[name] = (counts[name] || 0) + 1;
                });
                
                const linhVucHtml = Object.entries(counts)
                    .map(([key, val]) => `<span class="bg-indigo-50 px-1.5 py-0.5 rounded-md border border-indigo-100/50">${key}: ${val}</span>`)
                    .join('');
                document.getElementById('dtc_linh_vuc').innerHTML = linhVucHtml;
            }
        });
    </script>
</body>
</html>
