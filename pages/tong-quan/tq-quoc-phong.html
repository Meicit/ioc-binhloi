<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: white; 
            margin: 0; padding: 20px; 
            display: flex; align-items: center; height: 100vh; box-sizing: border-box;
        }
        .bar-label { width: 140px; font-size: 11px; font-weight: 600; color: #94a3b8; line-height: 1.2; padding-right: 15px; }
        .bar-container { height: 28px; border-radius: 8px; display: flex; align-items: center; position: relative; }
        .bar-value { position: absolute; right: -35px; font-weight: 800; color: #1e293b; font-size: 13px; }
    </style>
</head>
<body>
    <div class="w-full">
        <div class="flex items-center gap-2 mb-8">
            <div class="bg-[#10b981] p-1 rounded-lg shadow-sm">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-base font-extrabold text-[#1e293b]">Lĩnh vực Quốc phòng</h3>
        </div>

        <div class="space-y-6 pr-10">
            <div class="flex items-center">
                <div class="bar-label">Số lượng đăng ký khám sức khoẻ NVQS</div>
                <div class="flex-1">
                    <div class="bar-container bg-[#1d6fd1]" style="width: 100%"><span class="bar-value">8/8</span></div>
                </div>
            </div>
            <div class="flex items-center">
                <div class="bar-label">Chỉ tiêu xây dựng dân quân</div>
                <div class="flex-1">
                    <div class="bar-container bg-[#52c1a2]" style="width: 100%"><span class="bar-value">8/8</span></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
