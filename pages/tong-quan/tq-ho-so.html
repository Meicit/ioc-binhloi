<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }</style>
</head>
<body class="p-2">
    <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 flex flex-col h-[420px]">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">💼</div>
            <h3 class="text-[13px] font-black text-slate-800 uppercase tracking-tight">Thủ tục hành chính</h3>
        </div>

        <div class="flex-1 flex flex-col justify-center items-center">
            <div id="hs_rate" class="text-8xl font-black text-blue-600 tracking-tighter italic">0%</div>
            <p class="text-[11px] font-bold text-slate-400 uppercase mt-2 tracking-widest italic">Tỷ lệ đúng hạn</p>
        </div>

        <div class="grid grid-cols-2 gap-6 mt-auto">
            <div class="border-l-4 border-blue-700 pl-4">
                <div class="text-[10px] font-black text-slate-400 uppercase">Tổng hồ sơ</div>
                <div id="hs_luy_ke" class="text-2xl font-black text-slate-800">0</div>
            </div>
            <div class="border-l-4 border-orange-500 pl-4">
                <div class="text-[10px] font-black text-slate-400 uppercase">Hài lòng</div>
                <div id="hs_hai_long" class="text-2xl font-black text-slate-800">0%</div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" }));
        onValue(ref(db, 'dashboard_binhhung/ho_so_thang'), (snap) => {
            const d = snap.val() || {};
            const rate = d.luy_ke > 0 ? (d.truoc_han/d.luy_ke*100) : 0;
            document.getElementById('hs_luy_ke').innerText = (d.luy_ke || 0).toLocaleString();
            document.getElementById('hs_rate').innerText = rate.toFixed(1) + "%";
            document.getElementById('hs_hai_long').innerText = (d.hai_long_percent || 0) + "%";
        });
    </script>
</body>
</html>
