        const createItem = (label, value, customValueClass = "text-main-title") => `

                <span class="item-value ${customValueClass}">${value}</span>

        function renderData() {
            // ================== I. NỘI VỤ ==================
            const i = jsonData.I_Linh_vuc_Noi_vu;
            let iHtml = createItem("QĐ Hưu trí xã hội", i.Bao_tro_xa_hoi.Quyet_dinh_huu_tri_xa_hoi);
            iHtml += createItem("QĐ Người khuyết tật", i.Bao_tro_xa_hoi.Quyet_dinh_nguoi_khuyet_tat);
            iHtml += createItem("Hòa giải tranh chấp lương", i.Lao_dong.Hoa_giai_tranh_chap_tien_luong);
            iHtml += createItem("Tổng số trẻ em", i.Tre_em_Binh_dang_gioi.Tong_so_tre_em);

        // HỆ THỐNG ĐỔI THEME SÁNG/TỐI TỪ UI_UX.HTML
        function setTheme(themeName) {
            const body = document.getElementById('body-context');
            const btnLight = document.getElementById('btn-theme-light');
            const btnDark = document.getElementById('btn-theme-dark');

            if (themeName === 'light') {
                body.classList.remove('dark-theme'); 
                body.classList.add('light-theme');
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition bg-white text-blue-900 shadow-sm border border-transparent";
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition text-blue-800 hover:text-white border border-transparent";
            } else {
                body.classList.remove('light-theme'); 
                body.classList.add('dark-theme');
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition bg-red-600 text-white shadow-sm border border-transparent";
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition text-blue-200 hover:text-white border border-transparent";
            }
        }

        // HỆ THỐNG LOGIC ĐỔI CHỦ ĐỀ MÀU (XANH / ĐỎ)
        function switchSystemTheme(modeName) {
            const body = document.getElementById('body-context');
            if (modeName === 'do') {
                body.classList.remove('theme-xanh-ios'); 
                body.classList.add('theme-do-hanhchinh');
            } else {
                body.classList.remove('theme-do-hanhchinh'); 
                body.classList.add('theme-xanh-ios');
            }
            // Mặc định ép về chế độ Sáng khi chuyển Chủ đề Xanh/Đỏ
            setTheme('light'); 
        }

        // ĐÃ THÊM: Lắng nghe sự kiện đồng bộ theme từ iframe cha (dashboard.html)
        window.addEventListener('message', function(event) {
            if (event.data === 'theme-do') switchSystemTheme('do');
            else if (event.data === 'theme-xanh') switchSystemTheme('xanh');
            else if (event.data === 'theme-light') setTheme('light');
            else if (event.data === 'theme-dark') setTheme('dark');
        });

        // Khởi chạy khi load trang
        document.addEventListener('DOMContentLoaded', () => { 
            // Theme mặc định là light-theme và theme-xanh-ios từ body
            setTheme('light');
            renderData();
        });
    </script>
