<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống 34 Chỉ tiêu KTXH 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .group-card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 uppercase italic">Hệ thống 34 Chỉ tiêu</h1>
                <p class="text-slate-500 font-bold uppercase text-xs tracking-widest mt-1">UBND Xã Bình Hưng - Kế hoạch năm 2026</p>
            </div>
            <div class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-slate-200">
                <span class="text-[10px] font-black text-slate-400 uppercase block">Tổng tiến độ chung</span>
                <span id="tong_tien_do" class="text-2xl font-black text-blue-600">0%</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-10">
            <div class="group-card">
                <h3 class="text-sm font-black uppercase text-slate-400 mb-4 tracking-tighter">📊 Tỷ lệ hoàn thành theo nhóm lĩnh vực (%)</h3>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            <div class="group-card">
                <h3 class="text-sm font-black uppercase text-slate-400 mb-4 tracking-tighter">🍕 Cơ cấu số lượng chỉ tiêu</h3>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

        <div id="target-container" class="space-y-10">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = { 
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        const rootRef = ref(db, 'dashboard_binhhung/chi_tieu_2026');

        const nhomTen = {
            "I": "Chỉ tiêu Kinh tế",
            "II": "Văn hóa - Xã hội",
            "III": "Môi trường - Đô thị",
            "IV": "Cải cách hành chính",
            "V": "Quốc phòng - An ninh"
        };

        const colors = ["#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ef4444"];

        onValue(rootRef, (snap) => {
            const data = snap.val();
            if (!data) return;

            renderList(data);
            renderCharts(data);
        });

        function renderList(data) {
            const container = document.getElementById('target-container');
            container.innerHTML = "";

            const groups = {};
            Object.values(data).forEach(item => {
                if (!groups[item.nhom]) groups[item.nhom] = [];
                groups[item.nhom].push(item);
            });

            Object.keys(nhomTen).forEach((key, index) => {
                if (!groups[key]) return;

                let groupHtml = `
                    <div class="space-y-4">
                        <h2 class="text-xl font-black text-slate-800 flex items-center gap-3">
                            <span class="w-8 h-8 rounded-lg bg-slate-800 text-white flex items-center justify-center text-sm">${key}</span>
                            ${nhomTen[key]}
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                `;

                groups[key].forEach(item => {
                    const percent = item.kh > 0 ? Math.min((item.th / item.kh) * 100, 100).toFixed(1) : 0;
                    groupHtml += `
                        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-[10px] font-black px-2 py-1 bg-slate-100 text-slate-500 rounded uppercase">Số ${Object.keys(data).find(k => data[k] === item)}</span>
                                <span class="text-xs font-black ${percent >= 100 ? 'text-emerald-500' : 'text-blue-500'}">${percent}%</span>
                            </div>
                            <h4 class="text-sm font-bold text-slate-700 leading-snug h-10 overflow-hidden mb-4">${item.ten}</h4>
                            <div class="flex justify-between items-end">
                                <div>
                                    <span class="block text-[10px] text-slate-400 font-bold uppercase">Kế hoạch</span>
                                    <span class="text-sm font-black text-slate-800">${item.kh} <small class="text-[10px]">${item.dvt}</small></span>
                                </div>
                                <div class="text-right">
                                    <span class="block text-[10px] text-slate-400 font-bold uppercase">Thực hiện</span>
                                    <span class="text-sm font-black text-blue-600">${item.th}</span>
                                </div>
                            </div>
                            <div class="w-full bg-slate-100 h-1.5 rounded-full mt-4 overflow-hidden">
                                <div class="h-full bg-blue-500 rounded-full" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    `;
                });

                groupHtml += `</div></div>`;
                container.innerHTML += groupHtml;
            });
        }

        function renderCharts(data) {
            const groupStats = {};
            Object.keys(nhomTen).forEach(k => groupStats[k] = { totalPercent: 0, count: 0 });

            Object.values(data).forEach(item => {
                const p = item.kh > 0 ? (item.th / item.kh) * 100 : 0;
                groupStats[item.nhom].totalPercent += Math.min(p, 100);
                groupStats[item.nhom].count += 1;
            });

            const labels = Object.values(nhomTen);
            const barData = Object.keys(nhomTen).map(k => (groupStats[k].totalPercent / groupStats[k].count).toFixed(1));
            const pieData = Object.keys(nhomTen).map(k => groupStats[k].count);

            // Update tổng tiến độ
            const avgTotal = (barData.reduce((a, b) => parseFloat(a) + parseFloat(b), 0) / 5).toFixed(1);
            document.getElementById('tong_tien_do').innerText = avgTotal + "%";

            // Bar Chart
            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Tiến độ nhóm (%)',
                        data: barData,
                        backgroundColor: colors,
                        borderRadius: 8
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // Pie Chart
            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: pieData,
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: { maintainAspectRatio: false, cutout: '70%' }
            });
        }
    </script>
</body>
</html>
