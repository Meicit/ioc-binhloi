<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================= QUẢN LÝ MÀU NỀN & THEME TỔNG THỂ ================= */
        body {
            font-family: 'Inter', 'Be Vietnam Pro', sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column;
            transition: background 0.4s ease, color 0.4s ease;
        }

        body.light-theme { background-color: #f8fafc; color: #0f172a; }
        body.dark-theme { background-color: #082f49; color: #e0f2fe; }

        /* ================= KỸ THUẬT NỀN ĐỘNG GRADIENT TẠI HEADER ================= */
        body.light-theme.theme-xanh-ios .main-header {
            background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d);
            background-size: 400% 400%; animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(11, 74, 143, 0.15); border-bottom: 2px solid #032b5c;
        }

        body.light-theme.theme-do-hanhchinh .main-header {
            background: linear-gradient(-45deg, #dc2626, #7f1d1d, #ef4444, #450a0a);
            background-size: 400% 400%; animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.15); border-bottom: 2px solid #991b1b;
        }

        body.dark-theme .main-header {
            background: linear-gradient(-45deg, #020617, #0f172a, #082f49, #020617);
            background-size: 400% 400%; animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); border-bottom: 2px solid #082f49;
        }

        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        body.dark-theme .theme-selector-vertical { display: none !important; }

        .logo-main { animation: float 4s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2)); }
            50% { transform: translateY(-3px); filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3)); }
        }

        /* ================= KHỐI NỀN ĐỘNG BAO BỌC ================= */
        .menu-panel-wrapper {
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 32px;
            width: 100%; transition: all 0.5s ease;
        }

        body.light-theme.theme-xanh-ios .menu-panel-wrapper {
            background-color: rgba(128, 255, 232, 0.45); box-shadow: 0 20px 50px -10px rgba(12, 74, 110, 0.15);
        }
        body.light-theme.theme-do-hanhchinh .menu-panel-wrapper {
            background-color: rgba(220, 38, 38, 0.85); box-shadow: 0 20px 50px -10px rgba(185, 28, 28, 0.4); border-color: rgba(239, 68, 68, 1);
        }
        body.dark-theme .menu-panel-wrapper {
            background-color: rgba(8, 47, 73, 0.6); box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.4); border-color: rgba(56, 189, 248, 0.2); 
        }

        /* ================= ĐỒNG BỘ MÀU BANNER TIÊU ĐỀ ================= */
        .title-banner { transition: all 0.5s ease; }
        body.light-theme.theme-xanh-ios .title-banner { background-color: #0ea5e9; border-bottom-color: #0284c7; }
        body.light-theme.theme-do-hanhchinh .title-banner { background-color: #dc2626; border-bottom-color: #991b1b; }
        body.dark-theme .title-banner { background-color: rgba(15, 23, 42, 0.7); border-bottom-color: rgba(56, 189, 248, 0.5); backdrop-filter: blur(10px); }

        /* Màu Tiêu đề Cột */
        .theme-text { transition: color 0.3s; }
        body.light-theme.theme-xanh-ios .theme-text { color: #0b4a8f; }
        body.light-theme.theme-do-hanhchinh .theme-text { color: #da251d; }
        body.dark-theme .theme-text { color: #38bdf8; }

        /* ================= NÚT QUAY LẠI ================= */
        .btn-back { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid; padding: 10px 20px; border-radius: 12px; font-weight: 800; font-size: 12px; text-transform: uppercase; transition: all 0.3s ease; white-space: nowrap; }
        body.light-theme .btn-back { background: #ffffff; border-color: #e2e8f0; color: #334155; }
        body.light-theme .btn-back:hover { transform: translateY(-2px); border-color: #0ea5e9; color: #0ea5e9; }
        body.dark-theme .btn-back { background: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.3); color: #38bdf8; }
        body.dark-theme .btn-back:hover { transform: translateY(-2px); border-color: #7dd3fc; background: rgba(8, 47, 73, 0.9); }

        /* Thanh Tìm Kiếm */
        #search_input { transition: all 0.3s; }
        body.dark-theme #search_input { background-color: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.3); color: #e0f2fe; }
        body.dark-theme #search_input::placeholder { color: rgba(56, 189, 248, 0.5); }
        body.dark-theme #search_input:focus { border-color: #38bdf8; background-color: rgba(8, 47, 73, 0.9); }

        /* Footer */
        body.dark-theme footer { background-color: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.2); color: #38bdf8; backdrop-filter: blur(10px); }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.4); border-radius: 10px; }

        /* DANH SÁCH THẺ ĐỊA ĐIỂM */
        .tab-flat-item { border: 1px solid; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        body.light-theme .tab-flat-item { background: #ffffff; border-color: rgba(14, 165, 233, 0.15); }
        body.light-theme .tab-flat-item h3 { color: #0f172a; }
        body.light-theme .tab-flat-item p { color: #64748b; }
        body.light-theme .tab-flat-item:hover { transform: translateY(-2px) translateX(4px); border-color: #0ea5e9; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.1); }
        
        body.dark-theme .tab-flat-item { background: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.2); }
        body.dark-theme .tab-flat-item h3 { color: #e0f2fe; }
        body.dark-theme .tab-flat-item p { color: #7dd3fc; }
        body.dark-theme .tab-flat-item:hover { transform: translateY(-2px) translateX(4px); border-color: #38bdf8; background-color: rgba(12, 74, 110, 0.8); }

        /* ================= NÚT GOOGLE MAPS ================= */
        .btn-map { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: 12px; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid; transition: all 0.3s ease; text-decoration: none; align-self: flex-start; margin-top: 12px; }
        
        body.light-theme.theme-xanh-ios .btn-map { background: #f0f9ff; color: #0284c7; border-color: #bae6fd; }
        body.light-theme.theme-xanh-ios .btn-map:hover { background: #0284c7; color: white; border-color: #0284c7; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2); }
        
        body.light-theme.theme-do-hanhchinh .btn-map { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
        body.light-theme.theme-do-hanhchinh .btn-map:hover { background: #dc2626; color: white; border-color: #dc2626; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(220, 38, 38, 0.2); }
        
        body.dark-theme .btn-map { background: rgba(14, 165, 233, 0.1); color: #38bdf8; border-color: rgba(56, 189, 248, 0.3); }
        body.dark-theme .btn-map:hover { background: #0ea5e9; color: white; border-color: #0ea5e9; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3); }

        @media (max-width: 1024px) {
            .header-layout { flex-direction: column !important; }
            .theme-selector-vertical { position: relative !important; top: 0 !important; right: 0 !important; margin-top: 16px; flex-direction: row !important; space-x: 2; width: auto !important; }
            .theme-selector-vertical button { margin-left: 4px; margin-right: 4px; }
        }
    </style>
</head>

        // HÀM RENDER DỮ LIỆU
        function renderList(dataArray, containerId, isSchool = false) {
            const container = document.getElementById(containerId);
            if (dataArray.length === 0) {
                container.innerHTML = `<p class="p-4 w-full text-slate-500 dark:text-sky-300 font-bold text-sm">❌ Không tìm thấy kết quả phù hợp!</p>`;
                return;
            }

            container.innerHTML = dataArray.map(item => {
                let name = isSchool ? item["ĐƠN VỊ"] : item.name;
                let address = isSchool ? item["ĐỊA CHỈ"] : item.address;
                let phone = isSchool ? item["SỐ ĐIỆN THOẠI LIÊN LẠC"] : item.phone;
                let mapLink = isSchool ? item["đường đi"] : item.map_link;

                let mapButton = mapLink ? `
                    <a href="${mapLink}" target="_blank" rel="noopener noreferrer" class="btn-map">
                        🗺️ Xem trên Google Maps
                    </a>` : '';

                return `
                <div class="tab-flat-item px-6 py-5 rounded-2xl flex flex-col justify-between shadow-sm w-full h-full">
                    <div>
                        <h3 class="text-sm md:text-base font-black tracking-tight mb-2 uppercase">${name}</h3>
                        <p class="text-[11px] md:text-xs font-medium flex items-start gap-2 mb-2 leading-relaxed">
                            <span class="opacity-70 flex-shrink-0 mt-0.5">📍</span> 
                            <span>${address}</span>
                        </p>
                        <p class="text-[11px] md:text-xs font-bold flex items-center gap-2 dynamic-phone">
                            <span class="opacity-70 flex-shrink-0">📞</span> 
                            <span>${phone || 'Đang cập nhật'}</span>
                        </p>
                    </div>
                    ${mapButton}
                </div>
                `;
            }).join('');
        }

        // ĐỔI MÀU ICON THEO THEME SÁNG TỐI
        function applyDarkModeOverrides() {
            if(document.body.classList.contains('dark-theme')) {
                document.querySelectorAll('.dynamic-phone').forEach(el => el.style.color = '#38bdf8');
            } else {
                document.querySelectorAll('.dynamic-phone').forEach(el => el.style.color = '#0284c7');
            }
        }

        // TÌM KIẾM CHUNG 2 DANH SÁCH
        document.getElementById('search_input').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            
            const filteredHQ = hqData.filter(item => 
                item.name.toLowerCase().includes(keyword) || 
                item.address.toLowerCase().includes(keyword) ||
                (item.phone && item.phone.toLowerCase().includes(keyword))
            );
            
            const filteredSchools = schoolData.filter(item => 
                item["ĐƠN VỊ"].toLowerCase().includes(keyword) || 
                item["ĐỊA CHỈ"].toLowerCase().includes(keyword) ||
                (item["SỐ ĐIỆN THOẠI LIÊN LẠC"] && item["SỐ ĐIỆN THOẠI LIÊN LẠC"].toLowerCase().includes(keyword))
            );

            renderList(filteredHQ, 'list_container_hq', false);
            renderList(filteredSchools, 'list_container_school', true);
            applyDarkModeOverrides();
        });

        // CHUYỂN ĐỔI THEME HỆ THỐNG
        window.switchSystemTheme = function(modeName) {
            const body = document.getElementById('dynamic-body');
            const btnXanh = document.getElementById('btn-theme-xanh');
            const btnDo = document.getElementById('btn-theme-do');

            if (modeName === 'do') {
                body.classList.remove('theme-xanh-ios'); body.classList.add('theme-do-hanhchinh');
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-red-600 text-white shadow-md";
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white border border-transparent";
            } else {
                body.classList.remove('theme-do-hanhchinh'); body.classList.add('theme-xanh-ios');
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-blue-600 text-white shadow-md";
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white border border-transparent";
            }
        }

        // TẮT / BẬT ĐÈN
        window.setTheme = function(themeName) {
            const body = document.getElementById('dynamic-body');
            const btnLight = document.getElementById('btn-theme-light');
            const btnDark = document.getElementById('btn-theme-dark');

            if(themeName === 'light') {
                body.classList.remove('dark-theme'); body.classList.add('light-theme');
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-4 py-2 rounded-lg transition bg-white text-blue-900 shadow-sm border border-blue-200";
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-4 py-2 rounded-lg transition border border-transparent text-slate-500 hover:text-blue-900 dark:text-sky-200 dark:hover:text-white";
            } else {
                body.classList.remove('light-theme'); body.classList.add('dark-theme');
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-4 py-2 rounded-lg transition bg-sky-600 text-white shadow-sm border border-sky-500";
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-4 py-2 rounded-lg transition border border-transparent text-sky-400 hover:text-sky-300";
            }
            applyDarkModeOverrides();
        }

        // INIT
        document.addEventListener("DOMContentLoaded", () => {
            setTheme('light');
            renderList(hqData, 'list_container_hq', false);
            renderList(schoolData, 'list_container_school', true);
            applyDarkModeOverrides();
        });
    </script>
</body>
