<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trụ sở cơ quan hành chính - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================= QUẢN LÝ MÀU NỀN & THEME TỔNG THỂ ================= */
        body {
            font-family: 'Inter', 'Be Vietnam Pro', sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .container-wrapper { max-width: 1550px; margin: 0 auto 30px auto; padding: 0 24px; width: 100%; }

        /* ================= KỸ THUẬT NỀN ĐỘNG GRADIENT TẠI HEADER ================= */
        body.light-theme.theme-xanh-ios .main-header {
            background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d);
            background-size: 400% 400%; animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(11, 74, 143, 0.15); border-bottom: 2px solid #032b5c;
        }

        body.light-theme.theme-do-hanhchinh .main-header {
            background: linear-gradient(-45deg, #dc2626, #7f1d1d, #ef4444, #450a0a);
            background-size: 400% 400%; animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.15); border-bottom: 2px solid #991b1b;
        }

        body.dark-theme .main-header {
            background: linear-gradient(-45deg, #020617, #0f172a, #082f49, #020617);
            background-size: 400% 400%; animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); border-bottom: 2px solid #082f49;
        }

        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .logo-main { animation: float 4s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2)); }
            50% { transform: translateY(-3px); filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3)); }
        }

        /* ================= KHUNG NỀN CHÍNH (TEAL WRAPPER) ================= */
        .teal-wrapper { 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border-radius: 36px; padding: 24px; transition: all 0.4s ease; min-height: 60vh; 
        }
        @media (min-width: 768px) { .teal-wrapper { padding: 36px; } }

        /* THEME TỐI (DARK MODE) */
        body.dark-theme { background-color: #082f49; color: #f0f9ff; }
        body.dark-theme .teal-wrapper { background-color: rgba(14, 165, 233, 0.08); border: 1px solid rgba(14, 165, 233, 0.3); box-shadow: 0 20px 40px -15px rgba(8, 47, 73, 0.6); }
        body.dark-theme .control-theme-color { display: none !important; }
        body.dark-theme .title-banner { background-color: rgba(15, 23, 42, 0.7); border-bottom-color: rgba(56, 189, 248, 0.5); backdrop-filter: blur(10px); }

        /* THEME SÁNG (LIGHT MODE) */
        body.light-theme { background-color: #f8fafc; color: #1e3a8a; }

        /* SÁNG + XANH */
        body.light-theme.theme-xanh-ios { color: #1e3a8a; }
        body.light-theme.theme-xanh-ios .teal-wrapper { background-color: rgba(14, 165, 233, 0.08); border: 1px solid rgba(14, 165, 233, 0.3); }
        body.light-theme.theme-xanh-ios .title-banner { background-color: #0ea5e9; border-bottom-color: #0284c7; }

        /* SÁNG + ĐỎ */
        body.light-theme.theme-do-hanhchinh { color: #1e3a8a; } 
        body.light-theme.theme-do-hanhchinh .teal-wrapper { 
            background-color: #da251d; border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 20px 40px -15px rgba(218, 37, 29, 0.4);
        }
        body.light-theme.theme-do-hanhchinh .title-banner { background-color: #dc2626; border-bottom-color: #991b1b; }

        /* NÚT QUAY LẠI ĐỘNG */
        .btn-back { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 14px; font-weight: 800; font-size: 12px; text-transform: uppercase; transition: all 0.3s ease; border: 1px solid; }
        body.dark-theme .btn-back { background: rgba(14, 165, 233, 0.1); border-color: rgba(14, 165, 233, 0.3); color: #e0f2fe; }
        body.dark-theme .btn-back:hover { background: rgba(14, 165, 233, 0.2); border-color: #38bdf8; transform: translateY(-2px); }
        
        body.light-theme.theme-xanh-ios .btn-back { background: rgba(14, 165, 233, 0.1); border-color: rgba(14, 165, 233, 0.3); color: #1e3a8a; }
        body.light-theme.theme-xanh-ios .btn-back:hover { background: rgba(14, 165, 233, 0.2); border-color: #0ea5e9; transform: translateY(-2px); }

        body.light-theme.theme-do-hanhchinh .btn-back { background: #ffffff; border-color: #fca5a5; color: #da251d; }
        body.light-theme.theme-do-hanhchinh .btn-back:hover { background: #fef2f2; border-color: #da251d; transform: translateY(-2px); }

        /* SCROLLBAR & CONTROLS */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { border-radius: 10px; }
        body.dark-theme .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.4); }
        body.light-theme.theme-xanh-ios .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.4); }
        body.light-theme.theme-do-hanhchinh .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.4); }

        .controls-wrapper { display: flex; gap: 12px; align-items: center; }
        .control-panel { border: 1px solid; padding: 4px; border-radius: 12px; display: flex; align-items: center; }
        
        body.dark-theme .control-panel { background: rgba(15, 23, 42, 0.5); border-color: rgba(56, 189, 248, 0.2); }
        body.light-theme.theme-xanh-ios .control-panel { background: rgba(255, 255, 255, 0.5); border-color: rgba(14, 165, 233, 0.3); }
        body.light-theme.theme-do-hanhchinh .control-panel { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.4); }

        @media (max-width: 1024px) { .controls-wrapper { flex-direction: column; align-items: flex-end; } }
        @media (max-width: 640px) { .flex-responsive { flex-direction: column; align-items: stretch; gap: 16px; } .controls-wrapper { flex-direction: row; justify-content: space-between; align-items: center; width: 100%; } }

        /* DANH SÁCH THẺ ĐỊA ĐIỂM (DỌC TRÁI) */
        .tab-flat-item { border: 1px solid; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        body.light-theme .tab-flat-item { background: #ffffff; border-color: rgba(14, 165, 233, 0.15); }
        body.light-theme .tab-flat-item h3 { color: #0f172a; }
        body.light-theme .tab-flat-item p { color: #64748b; }
        body.light-theme .tab-flat-item:hover { transform: translateX(4px); border-color: #0ea5e9; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.1); }
        
        body.dark-theme .tab-flat-item { background: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.2); }
        body.dark-theme .tab-flat-item h3 { color: #e0f2fe; }
        body.dark-theme .tab-flat-item p { color: #7dd3fc; }
        body.dark-theme .tab-flat-item:hover { transform: translateX(4px); border-color: #38bdf8; background-color: rgba(12, 74, 110, 0.8); }

        /* THANH TÌM KIẾM */
        #search_input { transition: all 0.3s; }
        body.dark-theme #search_input { background-color: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.3); color: #e0f2fe; }
        body.dark-theme #search_input::placeholder { color: rgba(56, 189, 248, 0.5); }
        body.dark-theme #search_input:focus { border-color: #38bdf8; background-color: rgba(8, 47, 73, 0.9); }

        body.dark-theme footer { background-color: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.2); color: #38bdf8; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="theme-xanh-ios light-theme custom-scrollbar" id="dynamic-body">

    <!-- HEADER -->
    <header class="main-header w-full py-6 px-6 md:px-12 select-none relative transition-all duration-300">
        <div class="max-w-[1550px] mx-auto flex flex-col items-center justify-center relative header-layout">
            <div class="flex flex-row items-center space-x-6 w-auto">
                <div class="flex-shrink-0">
                    <img src="logo.png" alt="Logo" class="logo-main w-20 h-auto" onerror="this.src='logo.png'">
                </div>
                <div class="flex flex-col items-start justify-center space-y-2 text-left">
                    <p class="text-white font-black tracking-[0.12em] text-xl md:text-2xl lg:text-3xl uppercase leading-none m-0 p-0 drop-shadow-[0_2px_4px_rgba(0,0,0,0.3)] font-['Montserrat']">
                        IOC BINH HUNG
                    </p>
                    <h1 class="title-main text-sm md:text-base lg:text-lg font-bold uppercase tracking-[0.08em] text-white/90 leading-tight m-0 p-0 drop-shadow-[0_2px_4px_rgba(0,0,0,0.2)]">
                        Cổng thông tin và điều hành xã Bình Hưng, Thành phố Hồ Chí Minh
                    </h1>
                </div>
            </div>
        </div>
    </header>

    <!-- BANNER TIÊU ĐỀ -->
    <div class="max-w-[1550px] w-full mx-auto px-4 md:px-6 mt-6">
        <div class="title-banner py-4 md:py-5 px-8 text-center shadow-lg rounded-2xl border-b-4">
            <h2 class="font-['Montserrat'] text-xl md:text-3xl font-black text-white uppercase tracking-wider leading-tight">
                TRỤ SỞ CƠ QUAN HÀNH CHÍNH XÃ BÌNH HƯNG
            </h2>
        </div>
    </div>

    <!-- KHUNG NỘI DUNG CHÍNH -->
    <div class="container-wrapper mt-6">
        <div class="teal-wrapper space-y-8">
            
            <!-- HEADER & CÔNG CỤ ĐIỀU KHIỂN -->
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 flex-responsive">
                <a href="../index.html" class="btn-back bg-white/50 backdrop-blur text-blue-900">⬅️ Quay lại Trang chủ</a>
                
                <div class="controls-wrapper">
                    <!-- Nút Đổi Sáng/Tối -->
                    <div class="control-panel">
                        <button onclick="setTheme('light')" id="btn-theme-light" class="flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition border border-transparent text-white">Sáng</button>
                        <button onclick="setTheme('dark')" id="btn-theme-dark" class="flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition border border-transparent text-white">Tối</button>
                    </div>

                    <!-- Nút Đổi Xanh/Đỏ -->
                    <div class="control-panel control-theme-color">
                        <button onclick="switchSystemTheme('xanh')" id="btn-theme-xanh" class="flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition border border-transparent">🔵 Xanh</button>
                        <button onclick="switchSystemTheme('do')" id="btn-theme-do" class="flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition border border-transparent">🔴 Đỏ</button>
                    </div>
                </div>
            </div>

            <!-- THANH TÌM KIẾM -->
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 w-full">
                <div class="relative w-full md:w-80 lg:w-96 shrink-0 ml-auto">
                    <span class="absolute left-3.5 top-2.5 text-base opacity-60">🔍</span>
                    <input type="text" id="search_input" placeholder="Tra cứu cơ quan..." class="w-full bg-white rounded-xl pl-10 pr-4 py-2.5 text-sm font-semibold border focus:outline-none focus:ring-4 focus:ring-blue-700/10 shadow-sm transition-all">
                </div>
            </div>

            <!-- DANH SÁCH CƠ QUAN -->
            <div class="w-full flex justify-start">
                <div id="list_container" class="w-full md:w-2/3 lg:w-1/2 xl:w-2/5 flex flex-col gap-4">
                    <!-- Nội dung danh sách render bằng JS -->
                </div>
            </div>

        </div> 
    </div>

    <!-- FOOTER -->
    <footer class="mt-auto text-center py-6 font-medium text-[11px] uppercase tracking-widest border-t bg-white shadow-sm transition-all duration-300">
        © 2026 IOC Bình Hưng — Smart Government Solution
    </footer>

    <!-- SCRIPT CHUYỂN ĐỔI THEME VÀ RENDER DỮ LIỆU -->
    <script>
        let localDataStore = [];

        const fallbackData = [
            { "id": 1, "name": "Đảng ủy xã Bình Hưng", "address": "A10/26A, đường số 10, KDC Bình Hưng, ấp 6, xã Bình Hưng, thành phố Hồ Chí Minh", "phone": "Đang cập nhật" },
            { "id": 2, "name": "Hội đồng nhân dân xã Bình Hưng", "address": "A10/26A, đường số 10, KDC Bình Hưng, ấp 6, xã Bình Hưng, thành phố Hồ Chí Minh", "phone": "Đang cập nhật" },
            { "id": 3, "name": "Ủy ban nhân dân xã Bình Hưng", "address": "A10/26A, đường số 10, KDC Bình Hưng, ấp 6, xã Bình Hưng, thành phố Hồ Chí Minh", "phone": "028 3981 0015" },
            { "id": 4, "name": "Ủy ban MTTQ Việt Nam xã Bình Hưng", "address": "A10/26A, đường số 10, KDC Bình Hưng, ấp 6, xã Bình Hưng, thành phố Hồ Chí Minh", "phone": "Đang cập nhật" },
            { "id": 5, "name": "Công an xã Bình Hưng", "address": "517 Quốc lộ 50, xã Bình Hưng, Thành phố Hồ Chí Minh", "phone": "028 3758 2121" },
            { "id": 6, "name": "Ban chỉ huy Quân sự xã Bình Hưng", "address": "đường số 9, khu dân cư Phong Phú 4 ấp 57, xã Bình Hưng, Thành phố Hồ Chí Minh", "phone": "028 6685 7131" },
            { "id": 7, "name": "Trạm Y tế xã Bình Hưng", "address": "Số 71A Đường số 1 Khu dân cư Bình Hưng, ấp 5, xã Bình Hưng, Thành phố Hồ Chí Minh", "phone": "028 3758 1063" },
            { "id": 8, "name": "Trung tâm Cung ứng dịch vụ công xã Bình Hưng", "address": "Đường số 19, Khu dân cư Phong Phú 4, ấp 57, xã Bình Hưng, Thành phố Hồ Chí Minh", "phone": "Đang cập nhật" },
            { "id": 9, "name": "Ban Quản lý dự án đầu tư xây dựng xã Bình Hưng", "address": "920 đường Văn Tiến Dũng, xã Bình Hưng, Thành phố Hồ Chí Minh", "phone": "Đang cập nhật" }
        ];

        // HIỂN THỊ DANH SÁCH DỌC
        function renderVerticalMenu(dataArray) {
            const container = document.getElementById('list_container');
            if (dataArray.length === 0) {
                container.innerHTML = `<p class="p-4 w-full text-slate-500 dark:text-sky-300 font-bold text-sm">❌ Không tìm thấy kết quả phù hợp!</p>`;
                return;
            }

            container.innerHTML = dataArray.map(item => `
                <div id="card_item_${item.id}" class="tab-flat-item px-6 py-5 rounded-2xl flex flex-col justify-center shadow-sm w-full">
                    <h3 class="text-sm md:text-base font-black tracking-tight mb-2">${item.name}</h3>
                    <p class="text-[11px] md:text-xs font-medium flex items-start gap-2 mb-2 leading-relaxed">
                        <span class="opacity-70 flex-shrink-0 mt-0.5">📍</span> 
                        <span>${item.address}</span>
                    </p>
                    <p class="text-[11px] md:text-xs font-bold flex items-center gap-2 dynamic-phone">
                        <span class="opacity-70 flex-shrink-0">📞</span> 
                        <span>${item.phone}</span>
                    </p>
                </div>
            `).join('');
            
            applyDarkModeOverrides();
        }

        function applyDarkModeOverrides() {
            if(document.body.classList.contains('dark-theme')) {
                document.querySelectorAll('.dynamic-phone').forEach(el => el.style.color = '#38bdf8'); // Sky 400
            } else {
                document.querySelectorAll('.dynamic-phone').forEach(el => el.style.color = '#0284c7'); // Sky 600
            }
        }

        // TÌM KIẾM
        document.getElementById('search_input').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const filteredData = localDataStore.filter(item => 
                item.name.toLowerCase().includes(keyword) || 
                item.address.toLowerCase().includes(keyword) ||
                (item.phone && item.phone.toLowerCase().includes(keyword))
            );
            renderVerticalMenu(filteredData);
        });

        // HÀM CHUYỂN ĐỔI THEME (SÁNG/TỐI)
        window.setTheme = function(themeName) {
            const body = document.getElementById('dynamic-body');
            const btnLight = document.getElementById('btn-theme-light');
            const btnDark = document.getElementById('btn-theme-dark');

            if(themeName === 'light') {
                body.classList.remove('dark-theme'); 
                body.classList.add('light-theme');
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition bg-white text-blue-900 shadow-sm border border-blue-200";
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition text-blue-200 hover:text-white";
            } else {
                body.classList.remove('light-theme'); 
                body.classList.add('dark-theme');
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition bg-red-600 text-white shadow-sm";
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition text-blue-200 hover:text-white";
            }
            applyDarkModeOverrides();
        }

        // HÀM CHUYỂN ĐỔI HỆ MÀU (XANH/ĐỎ)
        window.switchSystemTheme = function(modeName) {
            const body = document.getElementById('dynamic-body');
            if (modeName === 'do') {
                body.classList.remove('theme-xanh-ios'); 
                body.classList.add('theme-do-hanhchinh');
            } else {
                body.classList.remove('theme-do-hanhchinh'); 
                body.classList.add('theme-xanh-ios');
            }
            setTheme('light'); 
        }

        // KHỞI TẠO MẶC ĐỊNH
        document.addEventListener("DOMContentLoaded", () => {
            setTheme('light');
            localDataStore = fallbackData;
            renderVerticalMenu(localDataStore);
        });
    </script>
</body>
</html>
