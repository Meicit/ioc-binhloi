<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trụ sở cơ quan hành chính - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================= QUẢN LÝ MÀU NỀN & THEME TỔNG THỂ ================= */
        body {
            font-family: 'Inter', 'Be Vietnam Pro', sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* THEME SÁNG (MẶC ĐỊNH) */
        body.light-theme {
            background-color: #f8fafc; 
            color: #0f172a;
        }
        
        /* THEME TỐI (UNIFIED DARK MODE - KHÔNG CÒN XANH ĐỎ) */
        body.dark-theme {
            background-color: #082f49; 
            color: #e0f2fe;
        }

        /* ================= KỸ THUẬT NỀN ĐỘNG GRADIENT TẠI HEADER ================= */
        /* Chỉ áp dụng Xanh/Đỏ khi ở Theme Sáng */
        body.light-theme.theme-xanh-ios .main-header {
            background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d);
            background-size: 400% 400%; animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(11, 74, 143, 0.15); border-bottom: 2px solid #032b5c;
        }

        body.light-theme.theme-do-hanhchinh .main-header {
            background: linear-gradient(-45deg, #dc2626, #7f1d1d, #ef4444, #450a0a);
            background-size: 400% 400%; animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.15); border-bottom: 2px solid #991b1b;
        }

        /* Khi ở Theme Tối: Header chuyển sang màu Tối chuyên biệt (Deep Navy) */
        body.dark-theme .main-header {
            background: linear-gradient(-45deg, #020617, #0f172a, #082f49, #020617);
            background-size: 400% 400%; animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); border-bottom: 2px solid #082f49;
        }

        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* ẨN NÚT CHỌN XANH/ĐỎ KHI Ở THEME TỐI ĐỂ ĐỒNG BỘ UX */
        body.dark-theme .theme-selector-vertical {
            display: none !important;
        }

        /* LOGO ANIMATION */
        .logo-main { animation: float 4s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2)); }
            50% { transform: translateY(-3px); filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3)); }
        }

        /* ================= KHỐI NỀN ĐỘNG BAO BỌC ================= */
        .menu-panel-wrapper {
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 32px;
            width: 100%; transition: all 0.5s ease;
        }

        /* Nền Xanh / Đỏ chỉ áp dụng cho Theme Sáng */
        body.light-theme.theme-xanh-ios .menu-panel-wrapper {
            background-color: rgba(128, 255, 232, 0.45); box-shadow: 0 20px 50px -10px rgba(12, 74, 110, 0.15);
        }
        body.light-theme.theme-do-hanhchinh .menu-panel-wrapper {
            background-color: rgba(220, 38, 38, 0.85); box-shadow: 0 20px 50px -10px rgba(185, 28, 28, 0.4); border-color: rgba(239, 68, 68, 1);
        }

        /* Nền Tối chuyên dụng */
        body.dark-theme .menu-panel-wrapper {
            background-color: rgba(8, 47, 73, 0.6); 
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.4); 
            border-color: rgba(56, 189, 248, 0.2); 
        }

        /* ================= ĐỒNG BỘ MÀU BANNER TIÊU ĐỀ ================= */
        .title-banner { transition: all 0.5s ease; }
        body.light-theme.theme-xanh-ios .title-banner { background-color: #0ea5e9; border-bottom-color: #0284c7; }
        body.light-theme.theme-do-hanhchinh .title-banner { background-color: #dc2626; border-bottom-color: #991b1b; }
        
        body.dark-theme .title-banner { background-color: rgba(15, 23, 42, 0.7); border-bottom-color: rgba(56, 189, 248, 0.5); backdrop-filter: blur(10px); }

        /* ================= COMPONENT BÊN TRONG ================= */
        .btn-back { display: inline-flex; align-items: center; gap: 8px; border: 1px solid; padding: 12px 24px; border-radius: 14px; font-weight: 800; font-size: 12px; text-transform: uppercase; transition: all 0.3s ease; }
        
        body.light-theme .btn-back { background: #ffffff; border-color: #e2e8f0; color: #334155; }
        body.light-theme .btn-back:hover { transform: translateY(-2px); border-color: #0ea5e9; color: #0ea5e9; }
        
        body.dark-theme .btn-back { background: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.3); color: #38bdf8; }
        body.dark-theme .btn-back:hover { transform: translateY(-2px); border-color: #7dd3fc; background: rgba(8, 47, 73, 0.9); }

        /* Thanh Tìm Kiếm */
        #search_input { transition: all 0.3s; }
        body.dark-theme #search_input { background-color: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.3); color: #e0f2fe; }
        body.dark-theme #search_input::placeholder { color: rgba(56, 189, 248, 0.5); }
        body.dark-theme #search_input:focus { border-color: #38bdf8; background-color: rgba(8, 47, 73, 0.9); }

        /* Khung iframe bản đồ */
        body.dark-theme #map_frame_container { border-color: rgba(56, 189, 248, 0.3); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        /* Footer */
        body.dark-theme footer { background-color: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.2); color: #38bdf8; backdrop-filter: blur(10px); }

        /* Ẩn thanh cuộn của menu ngang */
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        .smooth-scroll { scroll-behavior: smooth; }

        /* MENU TABS ĐỊA ĐIỂM NGANG PHẲNG */
        .tab-flat-item { border: 1px solid; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Light Theme Tabs */
        body.light-theme .tab-flat-item { background: #ffffff; border-color: rgba(14, 165, 233, 0.15); }
        body.light-theme .tab-flat-item h3 { color: #0f172a; }
        body.light-theme .tab-flat-item p { color: #64748b; }
        body.light-theme .tab-flat-item:hover { transform: translateY(-2px); border-color: #0ea5e9; background-color: rgba(255, 255, 255, 0.95); }
        
        /* Dark Theme Tabs */
        body.dark-theme .tab-flat-item { background: rgba(8, 47, 73, 0.6); border-color: rgba(56, 189, 248, 0.2); }
        body.dark-theme .tab-flat-item h3 { color: #e0f2fe; }
        body.dark-theme .tab-flat-item p { color: #7dd3fc; }
        body.dark-theme .tab-flat-item:hover { transform: translateY(-2px); border-color: #38bdf8; background-color: rgba(8, 47, 73, 0.9); }

        /* Tab Active State */
        .tab-flat-item.active { color: #ffffff !important; }
        .tab-flat-item.active h3 { color: #ffffff !important; }
        .tab-flat-item.active p { color: rgba(255, 255, 255, 0.9) !important; }
        .tab-flat-item.active .dynamic-phone { color: #fcd34d !important; } 

        body.light-theme.theme-xanh-ios .tab-flat-item.active { border-color: #0b4a8f; background-color: #0b4a8f; box-shadow: 0 4px 12px rgba(11, 74, 143, 0.2); }
        body.light-theme.theme-do-hanhchinh .tab-flat-item.active { border-color: #7f1d1d; background-color: #7f1d1d; box-shadow: 0 4px 12px rgba(127, 29, 29, 0.4); }
        body.dark-theme .tab-flat-item.active { border-color: #38bdf8; background-color: #0284c7; box-shadow: 0 4px 12px rgba(2, 132, 199, 0.4); }

        /* NÚT ĐIỀU HƯỚNG MŨI TÊN */
        .scroll-btn {
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 10;
            width: 36px; height: 36px; border: 1px solid; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        
        /* Sáng */
        body.light-theme .scroll-btn { background: rgba(255,255,255,0.9); border-color: #e2e8f0; color: #0ea5e9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        body.light-theme.theme-do-hanhchinh .scroll-btn { color: #dc2626; border-color: #fca5a5; }
        body.light-theme .scroll-btn:hover { color: white; transform: translateY(-50%) scale(1.1); }
        body.light-theme.theme-xanh-ios .scroll-btn:hover { background: #0ea5e9; border-color: #0ea5e9; }
        body.light-theme.theme-do-hanhchinh .scroll-btn:hover { background: #dc2626; border-color: #dc2626; }
        
        /* Tối (Hợp nhất) */
        body.dark-theme .scroll-btn { background: rgba(8, 47, 73, 0.8); border-color: rgba(56, 189, 248, 0.3); color: #38bdf8; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        body.dark-theme .scroll-btn:hover { color: white; transform: translateY(-50%) scale(1.1); background: #0284c7; border-color: #38bdf8; }

        .btn-left { left: -10px; }
        .btn-right { right: -10px; }

        @media (max-width: 1024px) {
            .header-layout { flex-direction: column !important; }
            .theme-selector-vertical { 
                position: relative !important; top: 0 !important; right: 0 !important; 
                margin-top: 16px; flex-direction: row !important; space-x: 2; width: auto !important;
            }
            .theme-selector-vertical button { margin-left: 4px; margin-right: 4px; }
            .scroll-btn { display: none; }
        }
    </style>
</head>

        // HÀM HIỂN THỊ DANH SÁCH THẺ NGANG
        function renderHorizontalMenu(dataArray) {
            const container = document.getElementById('list_container');
            if (dataArray.length === 0) {
                container.innerHTML = `<p class="p-4 w-full text-center text-slate-500 dark:text-sky-300 font-bold text-xs">❌ Không tìm thấy kết quả phù hợp!</p>`;
                return;
            }

            container.innerHTML = dataArray.map(item => `
                <div id="card_item_${item.id}" onclick="switchMapLocation('${item.map_embed}', ${item.id})" 
                     class="tab-flat-item flex-shrink-0 snap-start px-5 py-4 rounded-2xl cursor-pointer flex flex-col justify-center min-w-[260px] md:min-w-[300px] max-w-[340px] shadow-sm">
                    <div class="flex items-center gap-2 mb-1.5">
                        <h3 class="text-xs md:text-sm font-black truncate tracking-tight">${item.name}</h3>
                    </div>
                    <p class="text-[10px] md:text-[11px] font-medium truncate flex items-center gap-1.5 mb-1">
                        <span class="opacity-70 flex-shrink-0">📍</span> ${item.address}
                    </p>
                    <p class="text-[10px] md:text-[11px] font-bold truncate flex items-center gap-1.5 dynamic-phone">
                        <span class="opacity-70 flex-shrink-0">📞</span> ${item.phone || 'Đang cập nhật'}
                    </p>
                </div>
            `).join('');
            
            // Cập nhật lại logic đổi màu cho icon phone
            applyDarkModeOverrides();
        }

        function applyDarkModeOverrides() {
            if(document.body.classList.contains('dark-theme')) {
                document.querySelectorAll('.dynamic-phone').forEach(el => {
                    if(!el.parentElement.classList.contains('active')) {
                        el.style.color = '#38bdf8'; // Sky 400
                    } else {
                        el.style.color = '#fcd34d'; // Amber 300
                    }
                });
            } else {
                document.querySelectorAll('.dynamic-phone').forEach(el => {
                    if(!el.parentElement.classList.contains('active')) {
                        el.style.color = '#0284c7'; // Sky 600
                    } else {
                        el.style.color = '#fcd34d'; // Amber 300
                    }
                });
            }
        }

        // HÀM CUỘN THANH MENU
        window.scrollList = function(direction) {
            const container = document.getElementById('list_container');
            const scrollAmount = 312; 
            container.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
        }

        // ĐIỀU HƯỚNG BẢN ĐỒ VÀ KÍCH HOẠT TAB
        window.switchMapLocation = function(embedUrl, id) {
            const mapFrame = document.getElementById('map_frame');
            mapFrame.setAttribute('src', embedUrl);
            
            document.querySelectorAll('.tab-flat-item').forEach(el => el.classList.remove('active'));
            const activeTab = document.getElementById(`card_item_${id}`);
            if(activeTab) {
                activeTab.classList.add('active');
                activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            applyDarkModeOverrides();
        }

        // TÌM KIẾM
        document.getElementById('search_input').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const filteredData = localDataStore.filter(item => 
                item.name.toLowerCase().includes(keyword) || 
                item.address.toLowerCase().includes(keyword) ||
                (item.phone && item.phone.toLowerCase().includes(keyword))
            );
            renderHorizontalMenu(filteredData);
            
            if(filteredData.length > 0) {
                switchMapLocation(filteredData[0].map_embed, filteredData[0].id);
            }
        });

        // CHUYỂN ĐỔI THEME HEADER XANH / ĐỎ ĐỒNG BỘ
        window.switchSystemTheme = function(modeName) {
            const body = document.getElementById('dynamic-body');
            const btnXanh = document.getElementById('btn-theme-xanh');
            const btnDo = document.getElementById('btn-theme-do');

            if (modeName === 'do') {
                body.classList.remove('theme-xanh-ios');
                body.classList.add('theme-do-hanhchinh');
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-red-600 text-white shadow-md";
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white";
            } else {
                body.classList.remove('theme-do-hanhchinh');
                body.classList.add('theme-xanh-ios');
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-blue-600 text-white shadow-md";
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white";
            }
        }

        // ĐIỀU CHUYỂN THEME SÁNG / TỐI TỔNG THỂ
        window.setTheme = function(themeName) {
            const body = document.getElementById('dynamic-body');
            const btnLight = document.getElementById('btn-theme-light');
            const btnDark = document.getElementById('btn-theme-dark');

            if(themeName === 'light') {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition bg-white text-blue-900 shadow-sm border border-blue-200";
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition border border-transparent text-slate-500 hover:text-blue-900 dark:text-sky-200 dark:hover:text-white";
            } else {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition bg-sky-600 text-white shadow-sm border border-sky-500";
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-extrabold uppercase px-3 py-1.5 rounded-lg transition border border-transparent text-sky-400 hover:text-sky-300";
            }
            applyDarkModeOverrides();
        }

        // KHỞI CHẠY KHI MỞ TRANG (MẶC ĐỊNH SÁNG)
        document.addEventListener("DOMContentLoaded", () => {
            setTheme('light');
            localDataStore = fallbackData;
            renderHorizontalMenu(localDataStore);
            if(localDataStore.length > 0) {
                switchMapLocation(localDataStore[0].map_embed, localDataStore[0].id);
            }
        });
    </script>
</body>
</html>
