<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trụ sở cơ quan hành chính - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', 'Be Vietnam Pro', sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #f8fafc; /* Nền phẳng xám trắng sạch sẽ đồng bộ home.html */
            color: #0f172a;
            display: flex;
            flex-direction: column;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* ================= KỸ THUẬT NỀN ĐỘNG GRADIENT TẠI HEADER ĐỒNG BỘ HOME.HTML ================= */
        body.theme-xanh-ios .main-header {
            background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d);
            background-size: 400% 400%;
            animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(11, 74, 143, 0.15);
            border-bottom: 2px solid #032b5c;
        }

        body.theme-do-hanhchinh .main-header {
            background: linear-gradient(-45deg, #dc2626, #7f1d1d, #ef4444, #450a0a);
            background-size: 400% 400%;
            animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.15);
            border-bottom: 2px solid #991b1b;
        }

        @keyframes gradientGIF {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* KHỐI NỀN TRONG SUỐT PHÍA DƯỚI CHỨA PH N HỆ BẢN ĐỒ */
        .menu-panel-wrapper {
            background-color: rgba(128, 255, 232, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            box-shadow: 0 20px 50px -10px rgba(12, 74, 110, 0.15);
            width: 100%;
        }

        /* LOGO ANIMATION CHUYỂN ĐỘNG NHẸ */
        .logo-main {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2)); }
            50% { transform: translateY(-3px); filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3)); }
        }

        /* Ẩn thanh cuộn của menu ngang trên các trình duyệt nhưng vẫn giữ tính năng vuốt trượt */
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

        /* MENU TABS ĐỊA ĐIỂM NGANG PHẲNG */
        .tab-flat-item {
            background: #ffffff;
            border: 1px solid rgba(14, 165, 233, 0.15);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .tab-flat-item:hover {
            transform: translateY(-2px);
            border-color: #0ea5e9;
            background-color: rgba(255, 255, 255, 0.95);
        }
        .tab-flat-item.active {
            border-color: #0b4a8f;
            background-color: #0b4a8f;
            color: #ffffff !important;
            box-shadow: 0 4px 12px rgba(11, 74, 143, 0.2);
        }
        /* Đồng bộ đổi màu chữ trong tab active */
        .tab-flat-item.active p { color: rgba(255, 255, 255, 0.8) !important; }
        .tab-flat-item.active h3 { color: #ffffff !important; }

        @media (max-width: 1024px) {
            .header-layout { flex-direction: column !important; }
            .theme-selector-vertical { 
                position: relative !important; top: 0 !important; right: 0 !important; 
                margin-top: 16px; flex-direction: row !important; space-x: 2; width: auto !important;
            }
            .theme-selector-vertical button { margin-left: 4px; margin-right: 4px; }
        }
    </style>
</head>
<body class="theme-xanh-ios custom-scrollbar" id="dynamic-body">

    <header class="main-header w-full py-6 px-6 md:px-12 select-none relative transition-all duration-300">
        <div class="max-w-[1550px] mx-auto flex flex-col items-center justify-center relative header-layout">
            
            <div class="flex flex-row items-center space-x-6 w-auto">
                
                <div class="flex-shrink-0">
                    <img src="logo.png" alt="Logo" class="logo-main w-20 h-auto">
                </div>
                
                <div class="flex flex-col items-start justify-center space-y-2 text-left">
                    <p class="text-white font-black tracking-[0.12em] text-xl md:text-2xl lg:text-3xl uppercase leading-none m-0 p-0 drop-shadow-[0_2px_4px_rgba(0,0,0,0.3)] font-['Montserrat']">
                        IOC BINH HUNG
                    </p>
                    <h1 class="title-main text-sm md:text-base lg:text-lg font-bold uppercase tracking-[0.08em] text-white/90 leading-tight m-0 p-0 drop-shadow-[0_2px_4px_rgba(0,0,0,0.2)]">
                        Cổng thông tin và điều hành xã Bình Hưng, Thành phố Hồ Chí Minh
                    </h1>
                </div>
                
            </div>

            <div class="theme-selector-vertical lg:absolute lg:top-0 lg:right-0 bg-white/10 backdrop-blur-md border border-white/20 p-1.5 rounded-xl flex flex-col space-y-1.5 w-[75px] z-20 shadow-inner">
                <button onclick="switchSystemTheme('xanh')" id="btn-theme-xanh" 
                    class="w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-blue-600 text-white shadow-md">
                    🔵 Xanh
                </button>
                <button onclick="switchSystemTheme('do')" id="btn-theme-do" 
                    class="w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white">
                    🔴 Đỏ
                </button>
            </div>
            
        </div>
    </header>

    <div class="max-w-[1550px] w-full mx-auto px-4 md:px-6 my-6 flex flex-col items-start space-y-4">
        
        <div class="btn-back-container">
            <a href="home.html" class="inline-flex items-center gap-2 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold text-xs uppercase tracking-wider shadow-sm transition-all duration-300 hover:-translate-y-0.5">
                ⬅️ Quay lại Trang chủ
            </a>
        </div>

        <div class="menu-panel-wrapper p-4 md:p-8 space-y-6">
            
            <div class="relative w-full max-w-xl mx-auto">
                <span class="absolute left-4 top-3.5 text-lg text-slate-400">🔍</span>
                <input type="text" id="search_input" placeholder="Nhập tên cơ quan hoặc từ khóa địa chỉ để tra cứu nhanh..." class="w-full bg-white border border-slate-200 rounded-xl px-12 py-3 text-sm font-semibold text-slate-800 focus:outline-none focus:border-blue-700 focus:ring-4 focus:ring-blue-700/10 shadow-sm placeholder-slate-400 font-['Inter'] transition-all">
            </div>

            <div id="list_container" class="w-full flex flex-row gap-3 overflow-x-auto pb-3 pt-1 scrollbar-none snap-x touch-pan-x">
                </div>

            <div class="w-full h-[400px] md:h-[550px] lg:h-[650px] rounded-2xl overflow-hidden border border-slate-200 shadow-lg bg-white relative transition-all duration-300">
                <iframe id="map_frame" src="" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            
        </div>
    </div>

    <footer class="mt-auto text-center py-6 text-slate-400 font-medium text-[11px] uppercase tracking-widest border-t border-slate-200 bg-white shadow-sm">
        &copy; 2026 IOC Bình Hưng — Smart Government Solution
    </footer>

    <script>
        let localDataStore = [];

        // ĐỒNG BỘ KHO DỮ LIỆU ĐẦY ĐỦ 9 THẺ CƠ QUAN HÀNH CHÍNH QUY CHUẨN
        const fallbackData = [
            {
                "id": 1,
                "name": "Đảng ủy xã Bình Hưng",
                "address": "A10/26A, đường số 10, KDC Bình Hưng, ấp 6, xã Bình Hưng, thành phố Hồ Chí Minh",
                "map_embed": "https://maps.google.com/maps?q=A10/26A%20%C4%91%C6%B0%E1%BB%9Dng%20s%E1%BB%91%2010%20KDC%20B%C3%ACnh%20H%C6%B0ng&t=&z=15&ie=UTF8&iwloc=&output=embed"
            },
            {
                "id": 2,
                "name": "Hội đồng nhân dân xã Bình Hưng",
                "address": "A10/26A, đường số 10, KDC Bình Hưng, ấp 6, xã Bình Hưng, thành phố Hồ Chí Minh",
                "map_embed": "https://maps.google.com/maps?q=A10/26A%20%C4%91%C6%B0%E1%BB%9Dng%20s%E1%BB%91%2010%20KDC%20B%C3%ACnh%20H%C6%B0ng&t=&z=15&ie=UTF8&iwloc=&output=embed"
            },
            {
                "id": 3,
                "name": "Ủy ban nhân dân xã Bình Hưng",
                "address": "A10/26A, đường số 10, KDC Bình Hưng, ấp 6, xã Bình Hưng, thành phố Hồ Chí Minh",
                "map_embed": "https://maps.google.com/maps?q=A10/26A%20%C4%91%C6%B0%E1%BB%9Dng%20s%E1%BB%91%2010%20KDC%20B%C3%ACnh%20H%C6%B0ng&t=&z=15&ie=UTF8&iwloc=&output=embed"
            },
            {
                "id": 4,
                "name": "Ủy ban MTTQ Việt Nam xã Bình Hưng",
                "address": "A10/26A, đường số 10, KDC Bình Hưng, ấp 6, xã Bình Hưng, thành phố Hồ Chí Minh",
                "map_embed": "https://maps.google.com/maps?q=A10/26A%20%C4%91%C6%B0%E1%BB%9Dng%20s%E1%BB%91%2010%20KDC%20B%C3%ACnh%20H%C6%B0ng&t=&z=15&ie=UTF8&iwloc=&output=embed"
            },
            {
                "id": 5,
                "name": "Công an xã Bình Hưng",
                "address": "517 Quốc lộ 50, xã Bình Hưng, Thành phố Hồ Chí Minh",
                "map_embed": "https://maps.google.com/maps?q=517%20Qu%E1%BB%91c%20l%E1%BB%99%2050%20B%C3%ACnh%20H%C6%B0ng&t=&z=15&ie=UTF8&iwloc=&output=embed"
            },
            {
                "id": 6,
                "name": "Ban chỉ huy Quân sự xã Bình Hưng",
                "address": "đường số 9, khu dân cư Phong Phú 4 ấp 57, xã Bình Hưng, Thành phố Hồ Chí Minh",
                "map_embed": "https://maps.google.com/maps?q=Khu%20d%C3%A2n%20c%C6%B0%20Phong%20Ph%C3%BA%204%20B%C3%ACnh%20Ch%C3%A1nh&t=&z=15&ie=UTF8&iwloc=&output=embed"
            },
            {
                "id": 7,
                "name": "Trạm Y tế xã Bình Hưng",
                "address": "Số 71A Đường số 1 Khu dân cư Bình Hưng, ấp 5, xã Bình Hưng, Thành phố Hồ Chí Minh",
                "map_embed": "https://maps.google.com/maps?q=Tr%E1%BB%A1m%20Y%20t%E1%BA%BF%20x%C3%A3%20B%C3%ACnh%20H%C6%B0ng&t=&z=15&ie=UTF8&iwloc=&output=embed"
            },
            {
                "id": 8,
                "name": "Trung tâm Cung ứng dịch vụ công xã Bình Hưng",
                "address": "Đường số 19, Khu dân cư Phong Phú 4, ấp 57, xã Bình Hưng, Thành phố Hồ Chí Minh",
                "map_embed": "https://maps.google.com/maps?q=%C4%90%C6%B0%E1%BB%9Dng%20s%E1%BB%91%2019%20KDC%20Phong%20Ph%C3%BA%204&t=&z=15&ie=UTF8&iwloc=&output=embed"
            },
            {
                "id": 9,
                "name": "Ban Quản lý dự án đầu tư xây dựng xã Bình Hưng",
                "address": "920 đường Văn Tiến Dũng, xã Bình Hưng, Thành phố Hồ Chí Minh",
                "map_embed": "https://maps.google.com/maps?q=920%20%C4%91%C6%B0%E1%BB%9Dng%20V%C4%83n%20Ti%E1%BA%BFn%20D%C5%A9ng%20B%C3%ACnh%20H%C6%B0ng&t=&z=15&ie=UTF8&iwloc=&output=embed"
            }
        ];

        async function fetchTruSoData() {
            try {
                const response = await fetch('data-tru-so.json');
                if (!response.ok) throw new Error("Không tìm thấy file JSON");
                localDataStore = await response.json();
            } catch (error) {
                console.log("Sử dụng cơ sở dữ liệu tích hợp sẵn của hệ thống.");
                localDataStore = fallbackData;
            } finally {
                renderHorizontalMenu(localDataStore);
                if(localDataStore.length > 0) {
                    switchMapLocation(localDataStore[0].map_embed, localDataStore[0].id);
                }
            }
        }

        // HÀM BIẾN ĐỔI DANH SÁCH THÀNH CÁC TAB CHỮ NGANG PHẲNG
        function renderHorizontalMenu(dataArray) {
            const container = document.getElementById('list_container');
            if (dataArray.length === 0) {
                container.innerHTML = `<p class="p-4 w-full text-center text-slate-500 font-bold text-xs">❌ Không tìm thấy kết quả phù hợp!</p>`;
                return;
            }

            container.innerHTML = dataArray.map(item => `
                <div id="card_item_${item.id}" onclick="switchMapLocation('${item.map_embed}', ${item.id})" 
                     class="tab-flat-item flex-shrink-0 snap-start px-5 py-3 rounded-xl cursor-pointer flex flex-col justify-center min-w-[240px] md:min-w-[280px] max-w-[320px]">
                    <div class="flex items-center gap-2">
                    <h3 class="text-xs md:text-sm font-extrabold text-slate-900 truncate tracking-tight">${item.name}</h3>
                    </div>
                    <p class="text-[10px] md:text-[11px] font-medium text-slate-500 truncate mt-1 pl-6">${item.address}</p>
                </div>
            `).join('');
        }

        // ĐIỀU HƯỚNG BẢN ĐỒ IFRAME VÀ ACTIVE TAB NGANG VỪA CHỌN
        window.switchMapLocation = function(embedUrl, id) {
            const mapFrame = document.getElementById('map_frame');
            mapFrame.setAttribute('src', embedUrl);
            
            document.querySelectorAll('.tab-flat-item').forEach(el => el.classList.remove('active'));
            const activeTab = document.getElementById(`card_item_${id}`);
            if(activeTab) {
                activeTab.classList.add('active');
                // Tự động cuộn tab được chọn ra giữa tầm nhìn của thanh menu ngang
                activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        // TRA CỨU ĐỊA ĐIỂM DỰA TRÊN Ô INPUT
        document.getElementById('search_input').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const filteredData = localDataStore.filter(item => 
                item.name.toLowerCase().includes(keyword) || 
                item.address.toLowerCase().includes(keyword)
            );
            renderHorizontalMenu(filteredData);
            
            // Nếu có kết quả sau bộ lọc, tự động kích hoạt địa điểm đầu tiên
            if(filteredData.length > 0) {
                switchMapLocation(filteredData[0].map_embed, filteredData[0].id);
            }
        });

        // HÀM CHUYỂN ĐỔI THEME ĐỘNG HEADER
        window.switchSystemTheme = function(modeName) {
            const body = document.getElementById('dynamic-body');
            const btnXanh = document.getElementById('btn-theme-xanh');
            const btnDo = document.getElementById('btn-theme-do');

            if (modeName === 'do') {
                body.classList.remove('theme-xanh-ios');
                body.classList.add('theme-do-hanhchinh');
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-red-600 text-white shadow-md";
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white";
            } else {
                body.classList.remove('theme-do-hanhchinh');
                body.classList.add('theme-xanh-ios');
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-blue-600 text-white shadow-md";
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white";
            }
        }

        document.addEventListener("DOMContentLoaded", fetchTruSoData);
    </script>
</body>
</html>
