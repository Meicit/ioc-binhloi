<div class="container-wrapper space-y-6" id="body-context">
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="glass-panel p-5 border-l-4 border-sky-500">
            <p class="text-[10px] font-bold text-sky-500 uppercase tracking-wider">Số lượng ấp</p>
            <h3 class="text-2xl font-black text-dynamic-title mt-1">39 <span class="text-sm font-bold text-dynamic-label">Ấp</span></h3>
        </div>
        <div class="glass-panel p-5 border-l-4 border-emerald-500">
            <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-wider">Tổng diện tích tự nhiên</p>
            <h3 class="text-2xl font-black text-dynamic-title mt-1">3.235,43 <span class="text-sm font-bold text-dynamic-label">ha</span></h3>
        </div>
        <div class="glass-panel p-5 border-l-4 border-amber-500">
            <p class="text-[10px] font-bold text-amber-500 uppercase tracking-wider">Quy mô dân cư</p>
            <h3 class="text-2xl font-black text-dynamic-title mt-1">43.444 <span class="text-sm font-bold text-dynamic-label">Hộ dân</span></h3>
        </div>
        <div class="glass-panel p-5 border-l-4 border-indigo-500">
            <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-wider">Quản lý tổng nhân khẩu</p>
            <h3 class="text-2xl font-black text-dynamic-title mt-1">163.387 <span class="text-sm font-bold text-dynamic-label">Người</span></h3>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-8 glass-panel p-5">
            <h2 class="text-xs font-black uppercase tracking-wider text-dynamic-title mb-3">📊 Biểu đồ So sánh Quy mô Top 10 Ấp đông dân nhất</h2>
            <div class="w-full relative h-[250px]"><canvas id="hamletsChart"></canvas></div>
        </div>
        <div class="lg:col-span-4 glass-panel p-5 flex flex-col">
            <h2 class="text-xs font-black uppercase tracking-wider text-dynamic-title mb-3">🏆 Bảng xếp hạng Top 5</h2>
            <div class="flex border-b mb-3" id="tab-nav-wrapper">
                <button onclick="switchTab('tab_pop', this)" class="w-full text-center pb-1.5 border-b-2 border-sky-500 text-sky-500 font-black">Dân số</button>
                <button onclick="switchTab('tab_house', this)" class="w-full text-center pb-1.5 border-b-2 border-transparent text-slate-400 font-bold">Số hộ</button>
            </div>
            <div id="tab_pop" class="tab-content space-y-2.5"></div>
            <div id="tab_house" class="tab-content space-y-2.5 hidden"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
        <div class="lg:col-span-5 glass-panel p-5">
            <h2 class="text-xs font-black uppercase tracking-wider text-dynamic-label mb-3">📋 Nhật ký điều hành</h2>
            <form id="hamletEditForm" class="space-y-3">
                <input type="text" id="f_name" readonly class="input-dark w-full text-dynamic-title">
                <input type="text" id="f_area" class="input-dark w-full">
                <button type="submit" id="btnSave" class="w-full bg-orange-600 text-white font-bold py-2 rounded-xl">💾 Cập nhật</button>
            </form>
        </div>
        <div class="lg:col-span-7 glass-panel p-5">
            <input type="text" id="search_hamlet" placeholder="Tìm kiếm ấp..." class="input-dark w-full mb-3">
            <div id="hamlets_grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 h-[300px] overflow-y-auto"></div>
        </div>
    </div>
</div>
