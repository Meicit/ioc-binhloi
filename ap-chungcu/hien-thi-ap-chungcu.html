<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung tâm Điều hành số 70 ấp - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; transition: background 0.3s ease; }
        .main-header { background-size: 400% 400%; animation: gradientGIF 12s ease infinite; }
        body.theme-xanh-ios .main-header { background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d); }
        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-panel { backdrop-filter: blur(16px); border-radius: 24px; box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="theme-xanh-ios light-theme" id="dynamic-body">

    <header class="main-header w-full py-6 px-6 md:px-12 mb-6">
        <div class="max-w-[1550px] mx-auto flex items-center justify-center relative">
            <div class="flex items-center space-x-6">
                <img src="logo.png" alt="Logo" class="w-20">
                <div>
                    <p class="text-white font-black text-2xl uppercase font-['Montserrat']">IOC BINH HUNG</p>
                    <h1 class="text-sm font-bold text-white/90">Cổng thông tin và điều hành xã Bình Hưng</h1>
                </div>
            </div>
        </div>
    </header>

    <div id="content-loader"></div>

    <script>
        // Tự động nạp file ap-so.html khi trang tải xong
        fetch('ap-so.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('content-loader').innerHTML = html;
            });
    </script>
</body>
</html>
