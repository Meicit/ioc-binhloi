<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .navbar { background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; border-bottom: 1px solid #1e293b; }
        .nav-bottom { display: flex; align-items: center; background-color: #1e293b; padding: 0 24px; overflow-x: auto; scrollbar-width: none; }
        .nav-bottom::-webkit-scrollbar { display: none; }

        .nav-item { padding: 14px 20px; cursor: pointer; border-bottom: 3px solid transparent; color: #94a3b8; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
        .nav-item:hover { color: white; background-color: rgba(255,255,255,0.05); }
        .nav-item.active { color: white; border-bottom-color: #3b82f6; font-weight: 800; background-color: rgba(59, 130, 246, 0.1); }
        .nav-item.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex: 1; width: 100%; border: none; background-color: #f8fafc; }
        
        #btn-unlock { cursor: pointer !important; transition: all 0.3s ease; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-top">
            <div class="flex items-center gap-4">
                <div class="h-10 w-10 flex items-center justify-center">
                    <img src="logo.png" alt="Logo UBND Xã Bình Hưng" class="h-9 w-auto object-contain">
                </div>
                <div>
                    <h2 class="text-sm font-black text-white uppercase tracking-tighter italic leading-none">UBND XÃ BÌNH HƯNG</h2>
                    <div class="text-[9px] font-bold text-blue-400 uppercase mt-1 italic tracking-widest">Điều hành số 2026</div>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <div class="hidden md:block text-right">
                    <div id="main-title" class="text-xs font-black text-blue-400 uppercase italic">Thông tin chung</div>
                    <div class="text-[10px] font-bold text-slate-500 uppercase mt-0.5" id="current-time">--/--/2026</div>
                </div>
                <button id="btn-unlock" type="button" onclick="handleUnlock()" class="px-5 py-2 rounded-lg text-[10px] font-black text-blue-400 border border-blue-900 uppercase hover:bg-blue-600 hover:text-white transition-all tracking-widest shadow-inner">
                    🔓 Mở khóa dữ liệu
                </button>
            </div>
        </div>

        <nav class="nav-bottom" id="main-nav">
            <a href="pages/tong-quan.html" target="main-frame" class="nav-item active" onclick="handleNavClick(this)">🏠 Thông tin chung</a>
            
            <div class="h-6 w-px bg-slate-700 mx-2"></div>
            
            <a href="pages/ho-so-hanh-chinh.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📋 Hồ sơ hành chính</a>
            <a href="pages/chi-tieu.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📈 Chỉ tiêu KT-XH</a>
            <a href="pages/don-thu.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📂 Đơn thư</a>
            <a href="pages/1022.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📞 Phản ánh 1022</a>
            <a href="pages/van-ban-chi-dao.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">⚖️ Văn bản chỉ đạo</a>
        </nav>
    </header>

    <main class="main-wrapper">
        <iframe name="main-frame" src="pages/tong-quan.html"></iframe>
    </main>

    <script>
        function handleUnlock() {
            const VIEW_PIN = "1234";
            const pin = window.prompt("Vui lòng nhập mã định danh để truy cập dữ liệu điều hành:");
            
            if (pin === VIEW_PIN) {
                const lockedItems = document.querySelectorAll('.nav-item.locked');
                lockedItems.forEach(el => {
                    el.classList.remove('locked');
                    el.style.pointerEvents = "auto";
                    el.style.opacity = "1";
                    el.style.filter = "none";
                });

                const btn = document.getElementById('btn-unlock');
                btn.innerHTML = "✅ ĐÃ MỞ KHÓA";
                btn.style.backgroundColor = "#059669"; 
                btn.style.color = "#ffffff";
                btn.style.borderColor = "transparent";
                btn.onclick = null; 
                
                alert("Mở khóa thành công!");
            } else if (pin !== null) {
                alert("Mã định danh không chính xác!");
            }
        }

        function handleNavClick(el) {
            if(el.classList.contains('locked')) return;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            const title = el.innerText.replace(/[^\w\sàáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/gi, '').trim();
            document.getElementById('main-title').innerText = title;
        }

        document.getElementById('current-time').innerText = new Date().toLocaleDateString('vi-VN');
    </script>
</body>
</html>
