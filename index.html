<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Thông tin & Điều hành số Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #031b4e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 📹 VIDEO INTRO TOÀN MÀN HÌNH NỀN - GỠ BỎ HOÀN TOÀN LỚP CHẮN MỜ */
        .bg-video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-video-content {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* Hiệu ứng chuyển trang mượt mà */
        .fade-out-system {
            opacity: 0;
            transform: scale(1.03);
            filter: blur(10px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
    </style>
</head>
<body class="select-none" id="body-context">

    <div class="bg-video-container">
        <video id="intro-video-player" class="bg-video-content" autoplay muted playsinline preload="auto">
            <source src="intro.mp4" type="video/mp4">
            Trình duyệt của bạn không hỗ trợ phát thẻ video.
        </video>
    </div>

    <div id="intro-container" class="max-w-3xl w-full mx-auto px-8 py-10 text-center z-10 transition-all duration-700
                                    bg-slate-950/40 backdrop-blur-md rounded-[32px] border border-white/10
                                    shadow-[0_20px_50px_rgba(0,0,0,0.5)] space-y-6">
        
        <div class="flex justify-center">
            <img src="logo.png" alt="Logo Xã Bình Hưng" class="w-20 h-auto filter drop-shadow-[0_4px_8px_rgba(0,0,0,0.4)]">
        </div>

        <div class="space-y-3">
            <p class="text-cyan-300 font-bold text-xs md:text-sm uppercase tracking-[0.25em] m-0">ỦY BAN NHÂN DÂN XÃ BÌNH HƯNG</p>
            <h1 class="text-2xl md:text-4xl lg:text-5xl font-black uppercase tracking-[0.18em] text-white font-['Montserrat'] leading-tight drop-shadow-md">
                TRUNG TÂM GIÁM SÁT<br class="hidden md:inline"> ĐIỀU HÀNH THÔNG MINH
            </h1>
        </div>

        <div class="pt-2">
            <button onclick="exitIntroImmediately()" class="inline-flex items-center gap-2 bg-blue-600/90 hover:bg-blue-600 border border-blue-500 text-white font-bold text-xs uppercase tracking-widest px-8 py-3 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-0.5">
                ⏩ Bỏ qua Intro & Vào Hệ Thống
            </button>
        </div>

    </div>

    <footer class="absolute bottom-6 text-center text-white/40 font-medium text-[10px] uppercase tracking-widest w-full z-10">
        &copy; 2026 IOC Bình Hưng — Smart Government Solution
    </footer>

    <script>
        const videoPlayer = document.getElementById("intro-video-player");
        const bodyContext = document.getElementById("body-context");

        // Bộ thiết lập và xử lý ép buộc tự động phát qua tường lửa bảo mật của các trình duyệt web
        document.addEventListener("DOMContentLoaded", () => {
            videoPlayer.muted = true; // Bắt buộc tắt tiếng để qua bộ lọc tự động phát của trình duyệt
            const playPromise = videoPlayer.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log("Video khởi chạy thành công!");
                }).catch(error => {
                    // Cơ chế dự phòng nếu trình duyệt cũ chặn cứng: Tự khởi chạy ngay khi người dùng tương tác lần đầu lên màn hình
                    document.addEventListener('click', () => {
                        videoPlayer.play();
                    }, { once: true });
                });
            }
        });

        // 🟢 LUỒNG TỰ ĐỘNG: Video chạy hết toàn bộ thời lượng -> Kích hoạt hiệu ứng chuyển cảnh mượt mà sang home.html
        videoPlayer.addEventListener("ended", () => {
            triggerTransitionToHome();
        });

        function triggerTransitionToHome() {
            bodyContext.classList.add("fade-out-system");
            setTimeout(() => {
                window.location.href = "home.html";
            }, 800);
        }

        // Hàm xử lý khi người dùng chủ động nhấn nút bỏ qua
        window.exitIntroImmediately = function() {
            videoPlayer.pause();
            triggerTransitionToHome();
        }
    </script>
</body>
</html>
