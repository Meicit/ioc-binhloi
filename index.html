<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; transition: transform 0.3s ease; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; left: 0; transform: translateX(-280px); }
            .sidebar.open { transform: translateX(0); }
        }
        .nav-item { padding: 14px 24px; cursor: pointer; border-left: 4px solid transparent; color: #94a3b8; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: all 0.2s; }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #1e293b; color: white; border-left-color: #3b82f6; font-weight: 800; }
        .nav-item.locked { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex: 1; width: 100%; border: none; background-color: #f8fafc; }
        .nav-group-label { padding: 20px 24px 8px; font-size: 10px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; }
        
        /* Đảm bảo nút mở khóa luôn nằm trên cùng và nhận diện click */
        #btn-unlock { position: relative; z-index: 110; cursor: pointer !important; }
    </style>
</head>
<body>
    <aside id="sidebar" class="sidebar shadow-2xl">
        <div class="p-8 border-b border-slate-800 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-4 flex items-center justify-center">
                <span class="text-2xl">📊</span>
            </div>
            <h2 class="text-sm font-black text-white uppercase tracking-tighter italic">UBND XÃ BÌNH HƯNG</h2>
            <div class="text-[9px] font-bold text-blue-400 uppercase mt-2 italic">Điều hành số 2026</div>
        </div>

        <div class="p-4 border-b border-slate-800 bg-slate-900/50">
            <button id="btn-unlock" type="button" onclick="handleUnlock()" class="w-full py-3 rounded-xl text-[10px] font-black text-blue-400 border border-blue-900 uppercase hover:bg-blue-600 hover:text-white transition-all tracking-widest shadow-inner">
                🔓 Mở khóa dữ liệu điều hành
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto" id="main-nav">
            <div class="nav-group-label">Công khai nội bộ</div>
            <a href="pages/tong-quan.html" target="main-frame" class="nav-item active" onclick="handleNavClick(this)">🏠 Tổng quan chung</a>
            
            <div class="nav-group-label">Dữ liệu chỉ đạo (Khóa)</div>
            <a href="pages/1022.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📞 Phản ánh 1022</a>
            <a href="pages/chi-tieu.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📈 Chỉ tiêu KT-XH 2026</a>
            <a href="pages/don-thu.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📂 Đơn thư</a>
            <a href="pages/ho-so-hanh-chinh.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📋 Giải quyết hồ sơ hành chính</a>
            <a href="pages/van-ban-chi-dao.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">⚖️ Văn bản chỉ đạo</a>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="bg-white border-b p-4 px-6 md:px-10 flex justify-between items-center shadow-sm">
            <h2 id="main-title" class="text-sm font-black text-blue-800 uppercase italic">Tổng quan chung</h2>
            <div class="text-[10px] font-bold text-slate-400 uppercase" id="current-time">--/--/2026</div>
        </header>
        <iframe name="main-frame" src="pages/tong-quan.html"></iframe>
    </div>

    <script>
        // Hàm mở khóa được tách riêng để đảm bảo độ tin cậy
        function handleUnlock() {
            const VIEW_PIN = "1234";
            const pin = window.prompt("Vui lòng nhập mã định danh để truy cập dữ liệu điều hành:");
            
            if (pin === VIEW_PIN) {
                // Mở khóa các mục menu
                const lockedItems = document.querySelectorAll('.nav-item.locked');
                lockedItems.forEach(el => {
                    el.classList.remove('locked');
                    el.style.pointerEvents = "auto";
                    el.style.opacity = "1";
                    el.style.filter = "none";
                });

                // Cập nhật trạng thái nút
                const btn = document.getElementById('btn-unlock');
                btn.innerText = "✅ DỮ LIỆU ĐÃ MỞ";
                btn.style.backgroundColor = "#059669"; // Emerald 600
                btn.style.color = "#ffffff";
                btn.style.border = "none";
                btn.onclick = null; // Vô hiệu hóa nút sau khi đã mở thành công
                
                alert("Mở khóa thành công! Quý Lãnh đạo đã có thể truy cập dữ liệu chuyên sâu.");
            } else if (pin !== null) {
                alert("Mã định danh không chính xác!");
            }
        }

        function handleNavClick(el) {
            if(el.classList.contains('locked')) return;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('main-title').innerText = el.innerText.substring(3);
        }

        document.getElementById('current-time').innerText = new Date().toLocaleDateString('vi-VN');
    </script>
</body>
</html>
