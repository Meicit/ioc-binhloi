<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung tâm Điều hành số 70 ấp - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* [Giữ nguyên CSS của bạn như cũ, thêm đoạn này vào] */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="dark-theme custom-scrollbar" id="body-context">
    <div class="container-wrapper space-y-6">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
            <a href="../home.html" class="btn-back">⬅️ Quay lại Trang chủ</a>
            <div class="bg-slate-900 border border-slate-700 p-1 rounded-xl flex items-center shadow-md backdrop-blur">
                <button onclick="setTheme('light')" class="text-[11px] font-bold px-3 py-1.5 rounded-lg text-white">☀️ Sáng</button>
                <button onclick="setTheme('dark')" class="text-[11px] font-bold px-3 py-1.5 rounded-lg bg-sky-600 text-white">🌙 Tối</button>
            </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
             </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 glass-panel p-5">
                <h2 class="text-xs font-black uppercase tracking-wider text-dynamic-title mb-3">📊 Biểu đồ so sánh</h2>
                <div class="w-full relative h-[250px]">
                    <canvas id="hamletsChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-4 glass-panel p-5">
                <h2 class="text-xs font-black uppercase tracking-wider text-dynamic-title mb-3">🏆 Bảng xếp hạng</h2>
                <div class="flex border-b border-slate-700 text-[10px] font-bold uppercase mb-3">
                    <button onclick="switchTab('tab_pop', this)" class="tab-btn-nav w-full text-center pb-1.5 border-b-2 border-sky-500 text-sky-400">Dân số</button>
                    <button onclick="switchTab('tab_house', this)" class="tab-btn-nav w-full text-center pb-1.5 border-b-2 border-transparent text-slate-500">Số hộ</button>
                    <button onclick="switchTab('tab_area', this)" class="tab-btn-nav w-full text-center pb-1.5 border-b-2 border-transparent text-slate-500">Diện tích</button>
                </div>
                
                <div id="tab_pop" class="tab-content active space-y-2.5"></div>
                <div id="tab_house" class="tab-content space-y-2.5"></div>
                <div id="tab_area" class="tab-content space-y-2.5"></div>
            </div>
        </div>
    </div>

    <script type="module">
        // [CÁC IMPORT FIREBASE CỦA BẠN]
        // ...
        
        // HÀM CHUYỂN TAB ĐÚNG CẤU TRÚC
        window.switchTab = function(tabId, btnElement) {
            // Ẩn tất cả nội dung tab
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            
            // Hiện tab được chọn
            document.getElementById(tabId).classList.add('active');
            document.getElementById(tabId).classList.remove('hidden');

            // Đổi style nút
            document.querySelectorAll('.tab-btn-nav').forEach(btn => {
                btn.classList.remove('border-sky-500', 'text-sky-400');
                btn.classList.add('border-transparent', 'text-slate-500');
            });
            btnElement.classList.add('border-sky-500', 'text-sky-400');
        }

        // Tự động khởi tạo tab đầu tiên khi trang load
        document.addEventListener("DOMContentLoaded", () => {
            const firstTab = document.querySelector('.tab-btn-nav');
            if(firstTab) firstTab.click();
        });

        // ... các hàm còn lại giữ nguyên ...
    </script>
</body>
</html>
