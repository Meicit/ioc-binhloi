        .container-wrapper { max-width: 1550px; margin: 0 auto; padding: 0 24px; width: 100%; }

        .text-3d-white-sub { color: #ffffff; text-shadow: 0 2px 2px rgba(0,0,0,0.5); }
        body.light-theme { background-color: #f8fafc; color: #0b4a8f; }
        body.dark-theme { background-color: #0f172a; color: #38bdf8; }
        .main-header { background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d); background-size: 400% 400%; animation: gradientGIF 12s ease infinite; }
        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 100% { background-position: 0% 50%; } }
    </style>
